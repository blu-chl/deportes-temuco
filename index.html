async function sb(method,table,body,params=''){
  const r=await fetch(`${SB_URL}/rest/v1/${table}${params}`,{method,headers:hdrs(),body:body?JSON.stringify(body):undefined})
  const t=await r.text();try{return JSON.parse(t)}catch(e){return[]}

function parseFormacion(str){
  const parts=str.trim().split('-').map(Number)
  if(parts.length<2||parts.some(isNaN)||parts.some(n=>n<1))return null
  if(parts.reduce((a,b)=>a+b,0)!==10)return null
  const lineas=[{pos:'POR',n:1}]
  parts.forEach((n,i)=>{
    if(i===0)lineas.push({pos:'DEF',n})
    else if(i===parts.length-1)lineas.push({pos:'DEL',n})
    else lineas.push({pos:'MED',n})
  })
  return lineas
}

function aplicarFormacionCustom(){
  const inp=document.getElementById('form-custom-inp');if(!inp)return
  const str=inp.value.trim().replace(/\s+/g,'')
  if(!str)return
  const parsed=parseFormacion(str)
  if(!parsed){toast('Debe sumar 10 (ej: 4-3-3, 3-4-1-2)',true);return}
  FORMACIONES[str]=parsed
  S.formacion=str
  S.titulares=[]
  // Guardar formaciones custom en localStorage
  const customs=JSON.parse(localStorage.getItem('dt-formaciones')||'{}')
  customs[str]=parsed
  localStorage.setItem('dt-formaciones',JSON.stringify(customs))
  render();toast(`Formación ${str} guardada ✓`)
}

// Cargar formaciones custom guardadas
try{
  const customs=JSON.parse(localStorage.getItem('dt-formaciones')||'{}')
  Object.entries(customs).forEach(([k,v])=>{if(!FORMACIONES[k])FORMACIONES[k]=v})
}catch(e){}

function calcMinutajeAuto(titularIds,evs,duracion=90){
  const mins={}
  titularIds.forEach(id=>{if(id)mins[id]=duracion})
  evs.filter(e=>e.tipo==='Sustitución').sort((a,b)=>a.minuto-b.minuto).forEach(sub=>{
    const min=sub.minuto||0
    if(sub.jugador_sale_id!=null&&mins[sub.jugador_sale_id]!==undefined)
      mins[sub.jugador_sale_id]=min
    if(sub.jugador_id!=null){
      if(mins[sub.jugador_id]===undefined)mins[sub.jugador_id]=0
      mins[sub.jugador_id]+=duracion-min
    }
  })
  return mins
}

// Helpers para nombre
function jugNombre(id){const j=S.jugadores.find(x=>x.id===id);return j?j.nombre:'?'}
function jugFoto(id){const j=S.jugadores.find(x=>x.id===id);return j?.foto_url||''}
function jugApellido(id){
  const j=S.jugadores.find(x=>x.id===id);if(!j)return'?'
  const p=j.nombre.trim().split(' ')
  return p.length>1?p.slice(1).join(' '):p[0]
}
function fmtValor(v){
  if(!v&&v!==0)return'-'
  const m=S.moneda||'€'
  const num=(+v).toLocaleString('es-CL')
  return m==='CLP'?`$${num} CLP`:`${m}${num}`
}

// Label para dropdowns según modo de ordenamiento
function jugOpts(){
  let lista=[...S.jugadores]
  if(S.ordenJug==='apellido'){
    lista.sort((a,b)=>{
      const aa=a.nombre.split(' ').slice(1).join(' ')||a.nombre
      const bb=b.nombre.split(' ').slice(1).join(' ')||b.nombre
      return aa.localeCompare(bb)
    })
  }else{
    lista.sort((a,b)=>a.numero-b.numero)
  }
  return lista.map(j=>{
    const ap=j.nombre.trim().split(' ').slice(1).join(' ')||j.nombre
    return`<option value="${j.id}">${j.numero} ${ap}</option>`
  }).join('')
}

async function cargarDatos(){
  const[jugs,parts,evs,less]=await Promise.all([
    get('jugadores','?activo=eq.true&order=numero'),
    get('partidos','?order=fecha'),
    get('eventos','?order=minuto'),
    get('lesiones','?alta=eq.false'),
  ])
  S.jugadores=Array.isArray(jugs)?jugs:[]
  S.partidos=Array.isArray(parts)?parts:[]
  S.eventos=Array.isArray(evs)?evs:[]
  S.lesiones=Array.isArray(less)?less:[]
  if(S.jugadores.length){
    S.ev.jugador_id=S.jugadores[0].id
    S.ev.jugador_sale_id=S.jugadores[0].id
    S.addLes.jugador_id=S.jugadores[0].id
  }
  applyBg();render()
}

function getStats(jugId){
  const evs=S.eventos.filter(e=>e.jugador_id===jugId)
  const mins=S.partidos.reduce((a,p)=>a+(S.eventos.some(e=>e.partido_id===p.id&&e.jugador_id===jugId)?90:0),0)
  return{goles:evs.filter(e=>e.tipo==='Gol').length,asist:evs.filter(e=>e.tipo==='Asistencia').length,minutos:mins}
}

function calcHdr(){
  const p=S.partidos
  const pg=p.filter(x=>x.goles_favor>x.goles_contra).length
  const pe=p.filter(x=>x.goles_favor===x.goles_contra).length
  const pp=p.filter(x=>x.goles_favor<x.goles_contra).length
  return{pg,pe,pp,pts:pg*3+pe,gf:p.reduce((a,x)=>a+x.goles_favor,0),gc:p.reduce((a,x)=>a+x.goles_contra,0)}
}

function applyBg(){
  const b=S.bgImage
  if(b){document.body.style.backgroundImage=`url('${b}')`;document.body.classList.add('has-bg')}
  else{document.body.style.backgroundImage='';document.body.classList.remove('has-bg')}
}

async function handleFotoUpload(jugId,input){
  const file=input.files[0];if(!file)return
  toast('Subiendo foto...')
  const ext=file.name.split('.').pop()
  const filename=`jugador_${jugId}_${Date.now()}.${ext}`
  try{
    const r=await fetch(`${SB_URL}/storage/v1/object/jugadores/${filename}`,{
      method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+AUTH_TOKEN,'Content-Type':file.type,'x-upsert':'true'},
      body:file
    })
    if(r.ok){
      const url=`${SB_URL}/storage/v1/object/public/jugadores/${filename}`
      await patch('jugadores',{foto_url:url},`?id=eq.${jugId}`)
      toast('Foto actualizada ✓');cerrarModal();await cargarDatos()
    }else toast('Error — verifica el bucket "jugadores" en Supabase',true)
  }catch(e){toast('Error de conexión',true)}
}

function renderPitch(){
  const form=FORMACIONES[S.formacion]||FORMACIONES['4-4-2']
  const slots=[]
  form.forEach((linea,li)=>{
    for(let i=0;i<linea.n;i++)slots.push({linea:li,pos:linea.pos,idx:slots.length})
  })
  const lineas=[]
  let cur=[],lastL=-1
  slots.forEach(s=>{
    if(s.linea!==lastL&&cur.length>0){lineas.push(cur);cur=[]}
    cur.push(s);lastL=s.linea
  })
  if(cur.length)lineas.push(cur)

  const jugOptsSlot=[...S.jugadores].sort((a,b)=>a.numero-b.numero).map(j=>{
    const ap=j.nombre.trim().split(' ').slice(1).join(' ')||j.nombre
    return`<option value="${j.id}">${j.numero} ${ap}${j.posicion_especifica?' · '+j.posicion_especifica:''}</option>`
  }).join('')

  const lineasHtml=[...lineas].reverse().map(linea=>`
    <div class="linea-pos">${linea.map(s=>{
      const jugId=S.titulares[s.idx]

      const subEntra=subEv?S.jugadores.find(x=>x.id===subEv.jugador_id):null
      const subAp=subEntra?(subEntra.nombre.trim().split(' ').slice(1).join(' ')||subEntra.nombre):''
      return`<div class="slot ${j?'filled':''}" onclick="selSlot(${s.idx})" title="${j?(S.partidoActivo?'📋 Clic para registrar evento':'Cambiar jugador'):'Asignar jugador'}">
        ${j&&S.partidoActivo?`<div style="position:absolute;top:-3px;right:-3px;width:12px;height:12px;background:var(--am);border-radius:50%;border:1px solid rgba(0,0,0,.5);font-size:7px;display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;line-height:1">+</div>`:''}

      </div>`
    }).join('')}</div>`).join('')

  const titCount=S.titulares.filter(x=>x).length

  return`<div class="panel">
    <div class="ph">
      <span class="pt">Formación y 11 inicial</span>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">

          <button class="bsm" onclick="S.titulares=[];render()">Limpiar</button>

function selSlot(idx){
  const jugId=S.titulares[idx]
  if(jugId&&S.partidoActivo){
    abrirEventoSlot(idx,jugId)
  }else{
    S.slotSeleccionado=idx;render()
    setTimeout(()=>{
      const sel=document.getElementById('sel-slot-jug')
      if(sel&&S.titulares[idx])sel.value=S.titulares[idx]
    },50)
  }
}

function asignarSlot(){
  const sel=document.getElementById('sel-slot-jug');if(!sel)return
  S.titulares[S.slotSeleccionado]=+sel.value||null
  S.slotSeleccionado=null;render()
}

function abrirEventoSlot(idx,jugId){
  S.slotEvPanel={jugId,slotIdx:idx,tipo:'Amarilla',minuto:1,subtipo:TIPOS_GOL[0],asistidor_id:'',asist_subtipo:'Pase',jugador_sale_id:''}
  renderEventoSlotModal()
}

function renderEventoSlotModal(){
  const p=S.slotEvPanel
  if(!p){document.getElementById('modal-root').innerHTML='';return}
  const j=S.jugadores.find(x=>x.id===p.jugId);if(!j)return
  const ini=j.nombre.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase()
  const ap=jugApellido(j.id)
  const tipos=[
    {t:'Gol',ico:'⚽',c:'var(--vc)'},
    {t:'Amarilla',ico:'🟡',c:'var(--am)'},
    {t:'Roja',ico:'🔴',c:'var(--ro)'},
    {t:'Asistencia',ico:'🅰️',c:'var(--az)'},
    {t:'Sustitución',ico:'🔄',c:'var(--gris)'},
  ]
  const tiposBtns=tipos.map(t=>{
    const isOn=p.tipo===t.t
    const sub=t.t==='Gol'?`'${TIPOS_GOL[0]}'`:t.t==='Asistencia'?`'${TIPOS_ASIST[0]}'`:`''`
    return`<button onclick="S.slotEvPanel.tipo='${t.t}';S.slotEvPanel.subtipo=${sub};renderEventoSlotModal()"
      style="padding:10px 4px;border-radius:8px;border:2px solid ${isOn?t.c:'var(--borde2)'};background:${isOn?t.c+'33':'rgba(0,0,0,.3)'};color:${isOn?t.c:'var(--gris)'};font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s;width:100%">
      <span style="font-size:20px">${t.ico}</span><span>${t.t}</span>
    </button>`
  }).join('')
  const opts=[...S.jugadores].sort((a,b)=>a.numero-b.numero).map(jj=>{
    const aap=jj.nombre.trim().split(' ').slice(1).join(' ')||jj.nombre
    return`<option value="${jj.id}">${jj.numero} ${aap}</option>`
  }).join('')
  const inputStyle='width:100%;background:rgba(0,0,0,.5);border:1px solid var(--borde2);border-radius:6px;padding:7px 10px;color:white;font-size:12px;font-family:var(--font)'

    <div class="fg"><label>Asistidor (opcional)</label><select onchange="S.slotEvPanel.asistidor_id=this.value;renderEventoSlotModal()" style="${inputStyle}">
      <option value="">— Sin asistencia —</option>${opts}</select></div>
    ${p.asistidor_id?`<div class="fg"><label>Tipo de asistencia</label><select onchange="S.slotEvPanel.asist_subtipo=this.value" style="${inputStyle}">
      ${TIPOS_ASIST.map(t=>`<option ${p.asist_subtipo===t?'selected':''}>${t}</option>`).join('')}</select></div>`:''}`
  }else if(p.tipo==='Asistencia'){
    extra=`<div class="fg"><label>Tipo de asistencia</label><select onchange="S.slotEvPanel.subtipo=this.value" style="${inputStyle}">
      ${TIPOS_ASIST.map(st=>`<option ${p.subtipo===st?'selected':''}>${st}</option>`).join('')}</select></div>`
  }else if(p.tipo==='Sustitución'){
    extra=`<div class="fg"><label>Entra en su lugar</label><select onchange="S.slotEvPanel.jugador_sale_id=this.value" style="${inputStyle}">

  document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this){S.slotEvPanel=null;document.getElementById('modal-root').innerHTML=''}">
    <div class="modal" style="width:400px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="jav" style="width:50px;height:50px;font-size:15px;flex-shrink:0">
            ${j.foto_url?`<img src="${j.foto_url}" style="width:100%;height:100%;object-fit:cover">`:`${ini}`}

async function guardarEventoSlot(){
  const p=S.slotEvPanel
  if(!p||!S.partidoActivo)return
  const r=await post('eventos',{
    partido_id:S.partidoActivo,jugador_id:p.jugId,tipo:p.tipo,minuto:+p.minuto,
    subtipo:['Gol','Asistencia'].includes(p.tipo)?p.subtipo:null,
    jugador_sale_id:p.tipo==='Sustitución'?(+p.jugador_sale_id||null):null,
  })
  if(Array.isArray(r)&&r[0]){
    let msg='Evento registrado ✓'
    if(p.tipo==='Gol'&&p.asistidor_id){
      await post('eventos',{partido_id:S.partidoActivo,jugador_id:+p.asistidor_id,tipo:'Asistencia',
        subtipo:p.asist_subtipo||'Pase',minuto:+p.minuto,jugador_sale_id:null})
      msg='Gol + Asistencia guardados ✓'
    }
    toast(msg)
    S.slotEvPanel=null
    document.getElementById('modal-root').innerHTML=''
    await cargarDatos();await selPartido(S.partidoActivo)
  }else toast('Error al guardar',true)
}

async function guardarFormacionPartido(){
  if(!S.partidoActivo)return
  await patch('partidos',{formacion:S.formacion,titulares:JSON.stringify(S.titulares)},`?id=eq.${S.partidoActivo}`)
  // Auto-calc and save minutaje silently
  const titIds=S.titulares.filter(x=>x)
  if(titIds.length>0){
    const mins=calcMinutajeAuto(titIds,S.evPartido,S.duracion)
    await Promise.all(Object.entries(mins).filter(([,v])=>v>0).map(([jid,minutos])=>
      fetch(`${SB_URL}/rest/v1/minutaje`,{
        method:'POST',
        headers:{...hdrs(),'Prefer':'resolution=merge-duplicates,return=representation'},
        body:JSON.stringify({partido_id:S.partidoActivo,jugador_id:+jid,minutos})
      })
    ))
  }
  toast('Formación y minutaje guardados ✓');await cargarDatos()
}

async function selPartido(id){
  S.partidoActivo=id;S.slotSeleccionado=null
  const[evs,part]=await Promise.all([
    get('eventos',`?partido_id=eq.${id}&order=minuto`),
    get('partidos',`?id=eq.${id}`)
  ])
  S.evPartido=Array.isArray(evs)?evs:[]
  if(Array.isArray(part)&&part[0]){
    const p=part[0]
    if(p.formacion)S.formacion=p.formacion
    if(p.titulares){try{S.titulares=JSON.parse(p.titulares)||[]}catch(e){S.titulares=[]}}
  }
  render()
}

async function guardarPartido(){
  if(!S.np.rival.trim()){toast('Ingresa el rival',true);return}
  const r=await post('partidos',S.np)
  if(Array.isArray(r)&&r[0]){
    toast('Partido guardado')
    S.np={rival:'',competencia:'Primera B',condicion:'Local',fecha:hoy(),goles_favor:0,goles_contra:0}
    S.npShow=false;await cargarDatos();await selPartido(r[0].id)
  }else toast('Error al guardar',true)
}

async function agregarEvento(){
  if(!S.partidoActivo){toast('Selecciona un partido',true);return}
  const ev=S.ev
  const r=await post('eventos',{
    partido_id:S.partidoActivo,jugador_id:+ev.jugador_id,tipo:ev.tipo,
    subtipo:['Gol','Asistencia'].includes(ev.tipo)?ev.subtipo:null,
    minuto:+ev.minuto,jugador_sale_id:ev.tipo==='Sustitución'?+ev.jugador_sale_id:null,
  })
  if(Array.isArray(r)&&r[0]){
    let msg='Evento registrado'
    // Si es gol con asistidor, registrar asistencia automáticamente
    if(ev.tipo==='Gol'&&ev.asistidor_id){
      await post('eventos',{
        partido_id:S.partidoActivo,jugador_id:+ev.asistidor_id,tipo:'Asistencia',
        subtipo:ev.asist_subtipo||'Pase',minuto:+ev.minuto,jugador_sale_id:null,
      })
      msg='Gol + Asistencia guardados ✓'
    }
    toast(msg)
    await cargarDatos()
    await selPartido(S.partidoActivo)
    // Auto-recalcular minutaje si hay titulares y es sustitución
    if(ev.tipo==='Sustitución'){
      const titIds=S.titulares.filter(x=>x)
      if(titIds.length>0){
        const mins=calcMinutajeAuto(titIds,S.evPartido,S.duracion)
        await Promise.all(Object.entries(mins).filter(([,v])=>v>0).map(([jid,minutos])=>
          fetch(`${SB_URL}/rest/v1/minutaje`,{
            method:'POST',
            headers:{...hdrs(),'Prefer':'resolution=merge-duplicates,return=representation'},
            body:JSON.stringify({partido_id:S.partidoActivo,jugador_id:+jid,minutos})
          })
        ))
        toast('Minutaje actualizado automáticamente ✓')
      }
    }
  }else toast('Error',true)
}

async function guardarEdicionEvento(){
  if(!S.editEv)return
  const e=S.editEv
  await patch('eventos',{
    minuto:+e.minuto,tipo:e.tipo,
    subtipo:['Gol','Asistencia'].includes(e.tipo)?e.subtipo:null,
    jugador_id:+e.jugador_id,
    jugador_sale_id:e.tipo==='Sustitución'?(+e.jugador_sale_id||null):null,
  },`?id=eq.${e.id}`)
  toast('Evento actualizado ✓')
  S.editEv=null
  await selPartido(S.partidoActivo)
}

// NOTE: Add to Supabase jugadores table: valor (numeric), nacionalidad (text), notas (text)
function renderPlantilla(){
  let lista=S.filtPos==='todos'?[...S.jugadores]:S.jugadores.filter(j=>j.posicion===S.filtPos)
  if(S.filtEstadoPlantilla!=='todos'){
    const wantLes=S.filtEstadoPlantilla==='lesionado'
    lista=lista.filter(j=>wantLes?S.lesiones.some(l=>l.jugador_id===j.id):!S.lesiones.some(l=>l.jugador_id===j.id))
  }
  const dir=S.ordenDir||'asc'
  const dm=dir==='asc'?1:-1
  if(S.ordenPlantilla==='apellido'){
    lista.sort((a,b)=>{const aa=a.nombre.split(' ').slice(1).join(' ')||a.nombre;const bb=b.nombre.split(' ').slice(1).join(' ')||b.nombre;return aa.localeCompare(bb)*dm})
  }else if(S.ordenPlantilla==='posicion'){

async function guardarJugador(){
  const j=S.addJug
  if(!j.nombre.trim()||!j.numero){toast('Completa nombre y número',true);return}
  const r=await post('jugadores',{
    nombre:j.nombre.trim(),numero:+j.numero,edad:+j.edad,posicion:j.posicion,
    posicion_especifica:j.posicion_especifica||null,
    pie:j.pie,altura:+j.altura||null,
    club_origen:j.club_origen||null,
    contrato_hasta:j.contrato_hasta||null,
    valor:+j.valor||null,
    nacionalidad:j.nacionalidad||'Chilena',
    notas:j.notas||null,
  })
  if(Array.isArray(r)&&r[0]){
    toast('Jugador agregado')
    S.addJugShow=false
    S.addJug={numero:'',nombre:'',posicion:'MED',posicion_especifica:'',edad:22,pie:'Derecho',altura:'',club_origen:'',contrato_hasta:'',valor:'',nacionalidad:'Chilena',notas:''}
    await cargarDatos()
  }else toast('Error',true)
}

// ===== PARTIDOS =====
function renderPartidos(){
  const fc=S.filtComp
  const lista=fc==='todos'?S.partidos:S.partidos.filter(p=>p.competencia===fc)
  const pg=lista.filter(p=>p.goles_favor>p.goles_contra).length
  const pe=lista.filter(p=>p.goles_favor===p.goles_contra).length
  const pp=lista.filter(p=>p.goles_favor<p.goles_contra).length
  const gf=lista.reduce((a,p)=>a+p.goles_favor,0)
  const gc=lista.reduce((a,p)=>a+p.goles_contra,0)
  const pz=lista.filter(p=>p.goles_contra===0).length
  const racha=[...lista].slice(-5).map(p=>p.goles_favor>p.goles_contra?'W':p.goles_favor===p.goles_contra?'D':'L')

  const cards=[...lista].reverse().map(p=>{
    const res=p.goles_favor>p.goles_contra?'W':p.goles_favor===p.goles_contra?'D':'L'
    const rb=res==='W'?'bv':res==='D'?'ba':'br'

    return`<div class="pcard" style="cursor:default;border-left:3px solid ${borderColor}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px">

          <span class="badge ${rb}">${rl}</span>

          <span style="font-size:10px;color:var(--gris)">${p.fecha}</span>
          <button class="bsm" style="padding:2px 8px;font-size:10px" onclick="abrirEditarPartido(${p.id})">✏️ Editar</button>
        </div>
      </div>
      <div class="rbox">
        <div class="req" style="text-align:right">Deportes Temuco</div>

  }).join('')

  return`<div class="content">
    <div class="tabs">${['todos','Primera B','Copa Chile'].map(c=>`<button class="tab ${fc===c?'on':''}" onclick="S.filtComp='${c}';render()">${c==='todos'?'Todos':c}</button>`).join('')}</div>

// ===== ESTADÍSTICAS =====
function renderEstadisticas(){
  const fc=S.filtCompEst
  const partsFilt=fc==='todos'?S.partidos:S.partidos.filter(p=>p.competencia===fc)
  const pidsFilt=new Set(partsFilt.map(p=>p.id))
  const evsFilt=S.eventos.filter(e=>pidsFilt.has(e.partido_id))

  const statsJug=S.jugadores.map(j=>{
    const evJ=evsFilt.filter(e=>e.jugador_id===j.id)
    const goles=evJ.filter(e=>e.tipo==='Gol').length
    const asist=evJ.filter(e=>e.tipo==='Asistencia').length
    const amarillas=evJ.filter(e=>e.tipo==='Amarilla').length
    const rojas=evJ.filter(e=>e.tipo==='Roja').length
    const min=partsFilt.reduce((a,p)=>a+(evsFilt.some(e=>e.partido_id===p.id&&e.jugador_id===j.id)?90:0),0)
    return{...j,goles,asist,amarillas,rojas,min,g90:min>0?goles/min*90:0,a90:min>0?asist/min*90:0}
  })

  const goleadores=[...statsJug].filter(j=>j.goles>0).sort((a,b)=>b.goles-a.goles)
  const asistidores=[...statsJug].filter(j=>j.asist>0).sort((a,b)=>b.asist-a.asist)
  const topG90=[...statsJug].filter(j=>j.min>=90&&j.goles>0).sort((a,b)=>b.g90-a.g90)
  const disciplina=[...statsJug].filter(j=>j.amarillas>0||j.rojas>0).sort((a,b)=>(b.amarillas+b.rojas*3)-(a.amarillas+a.rojas*3))

  const cGol={};TIPOS_GOL.forEach(t=>cGol[t]=0)
  evsFilt.filter(e=>e.tipo==='Gol').forEach(e=>{if(e.subtipo)cGol[e.subtipo]=(cGol[e.subtipo]||0)+1})
  const totG=Math.max(1,Object.values(cGol).reduce((a,b)=>a+b,0))
  const gf=partsFilt.reduce((a,p)=>a+p.goles_favor,0)
  const ta=evsFilt.filter(e=>e.tipo==='Amarilla').length
  const tr=evsFilt.filter(e=>e.tipo==='Roja').length
  const pz=partsFilt.filter(p=>p.goles_contra===0).length
  const locales=partsFilt.filter(p=>p.condicion==='Local')
  const visitas=partsFilt.filter(p=>p.condicion==='Visita')
  const locPts=locales.filter(p=>p.goles_favor>p.goles_contra).length*3+locales.filter(p=>p.goles_favor===p.goles_contra).length
  const visPts=visitas.filter(p=>p.goles_favor>p.goles_contra).length*3+visitas.filter(p=>p.goles_favor===p.goles_contra).length
  const golesT1=evsFilt.filter(e=>e.tipo==='Gol'&&e.minuto<=30).length
  const golesT2=evsFilt.filter(e=>e.tipo==='Gol'&&e.minuto>30&&e.minuto<=60).length

// ===== API FOOTBALL =====
async function apiF(endpoint){
  const k=S.apiF.key
  if(!k){toast('Configura tu API Key en ⚙ Config',true);return null}
  try{
    const r=await fetch(`${API_F_URL}${endpoint}`,{
      headers:{'x-apisports-key':k}
    })
    if(!r.ok){toast(`API error ${r.status}`,true);return null}
    const d=await r.json()
    if(d.errors&&Object.keys(d.errors).length){
      const msg=Object.values(d.errors)[0]
      toast('API: '+msg,true);return null
    }
    return d.response||[]
  }catch(e){toast('Sin conexión a la API',true);return null}
}

function normN(s){
  return(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim()
}

function matchJugador(apiName){
  if(!apiName||!S.jugadores.length)return null
  const n=normN(apiName)
  const parts=n.split(/\s+/).filter(p=>p.length>2)
  // Match by apellido (last word) first
  for(const j of S.jugadores){
    const jparts=normN(j.nombre).split(/\s+/)
    const jAp=jparts.slice(1).join(' ')||jparts[0]
    if(parts.some(p=>jAp.includes(p)||p.includes(jAp.split(' ')[0])))return j.id
  }
  // Fallback: any significant word match
  for(const j of S.jugadores){
    const jn=normN(j.nombre)
    if(parts.some(p=>p.length>3&&jn.includes(p)))return j.id
  }
  return null
}

async function sincPartido(silent=false){
  if(!S.partidoActivo){if(!silent)toast('Selecciona un partido primero',true);return}
  if(!S.apiF.teamId){if(!silent)toast('Configura el Team ID en ⚙ Config',true);return}
  const partido=S.partidos.find(p=>p.id===S.partidoActivo)
  if(!partido)return
  if(!silent){S.apiF.syncing=true;render()}

  // Detectar temporada desde la fecha del partido
  const season=partido.fecha.split('-')[0]
  // Find fixture by date + team
  const fixtures=await apiF(`/fixtures?team=${S.apiF.teamId}&date=${partido.fecha}&season=${season}&league=${API_F_LEAGUE}`)
  if(!fixtures||!fixtures.length){
    if(!silent)toast('Partido no encontrado en la API para '+partido.fecha,true)
    S.apiF.syncing=false;if(!silent)render();return
  }

  // Pick best match by rival name
  let fix=fixtures[0]
  if(fixtures.length>1){
    const rv=normN(partido.rival)
    const best=fixtures.find(f=>{
      const h=normN(f.teams.home.name),a=normN(f.teams.away.name)
      return h.includes(rv.split(' ')[0])||a.includes(rv.split(' ')[0])||
             rv.includes(h.split(' ')[0])||rv.includes(a.split(' ')[0])
    })
    if(best)fix=best
  }

  const fId=fix.fixture.id
  const isLocal=partido.condicion==='Local'
  const gf=isLocal?fix.goals.home:fix.goals.away
  const gc=isLocal?fix.goals.away:fix.goals.home

  // Update score
  if(gf!==null&&gf!==undefined&&(gf!==partido.goles_favor||gc!==partido.goles_contra)){
    await patch('partidos',{goles_favor:gf,goles_contra:gc},`?id=eq.${S.partidoActivo}`)
    if(!silent)toast(`Marcador: ${gf}-${gc} ✓`)
  }

  // Get events filtered by our team
  const evs=await apiF(`/fixtures/events?fixture=${fId}&team=${S.apiF.teamId}`)
  if(evs&&evs.length){
    const curEvs=await get('eventos',`?partido_id=eq.${S.partidoActivo}`)
    const cur=Array.isArray(curEvs)?curEvs:[]
    let imported=0

    for(const ev of evs){
      const min=(ev.time?.elapsed||0)+(ev.time?.extra||0)
      let tipo=null,subtipo=null

      if(ev.type==='Goal'&&ev.detail!=='Missed Penalty'&&ev.detail!=='Own Goal'){tipo='Gol';subtipo=TIPOS_GOL[0]}
      else if(ev.type==='Card'&&ev.detail==='Yellow Card')tipo='Amarilla'
      else if(ev.type==='Card'&&(ev.detail==='Red Card'||ev.detail==='Second Yellow card'))tipo='Roja'
      else if(ev.type==='subst')tipo='Sustitución'
      if(!tipo)continue

      const jugId=matchJugador(ev.player?.name)
      if(!jugId)continue

      if(cur.some(e=>e.tipo===tipo&&e.minuto===min&&e.jugador_id===jugId))continue

      const evData={partido_id:S.partidoActivo,jugador_id:jugId,tipo,minuto:min,subtipo,jugador_sale_id:null}
      if(tipo==='Sustitución')evData.jugador_sale_id=matchJugador(ev.assist?.name)||null
      await post('eventos',evData)
      imported++

      // Auto-import assist linked to goal
      if(tipo==='Gol'&&ev.assist?.name){
        const asId=matchJugador(ev.assist.name)
        if(asId&&asId!==jugId&&!cur.some(e=>e.tipo==='Asistencia'&&e.minuto===min&&e.jugador_id===asId)){
          await post('eventos',{partido_id:S.partidoActivo,jugador_id:asId,tipo:'Asistencia',minuto:min,subtipo:'Pase',jugador_sale_id:null})
          imported++
        }
      }
    }
    if(!silent&&imported>0)toast(`${imported} evento(s) importado(s) ✓`)
    else if(!silent&&imported===0)toast('Todo al día — sin eventos nuevos')
  }

  S.apiF.syncing=false
  S.apiF.lastSync=new Date().toLocaleTimeString('es-CL')
  await cargarDatos()
  await selPartido(S.partidoActivo)
}

        <div class="mc"><div class="mc-l">Partidos</div><div class="mc-v">${S.partidos.length}</div></div>
        <div class="mc"><div class="mc-l">Eventos</div><div class="mc-v">${S.eventos.length}</div></div>
        <div class="mc"><div class="mc-l">Lesiones</div><div class="mc-v ro">${S.lesiones.length}</div></div>
      </div>
    </div>
    <div class="config-section">
      <div class="config-title">🗄 Columnas nuevas en Supabase</div>
      <p style="font-size:11px;color:var(--gris);line-height:1.7">
        Agrega en la tabla <strong style="color:var(--vc)">jugadores</strong>:<br>
        · <code style="color:var(--am)">posicion_especifica</code> (text)<br>
        · <code style="color:var(--am)">altura</code> (int4)<br>
        · <code style="color:var(--am)">club_origen</code> (text)<br>
        · <code style="color:var(--am)">contrato_hasta</code> (date)<br>
        · <code style="color:var(--am)">foto_url</code> (text)<br>
        · <code style="color:var(--am)">valor</code> (numeric)<br>
        · <code style="color:var(--am)">nacionalidad</code> (text)<br>

      <button class="bsm" style="margin-top:8px" onclick="testConnection()">Probar conexión</button>

    <div class="config-section">
      <div class="config-title">📡 API Football — Sincronización automática</div>
      <p style="font-size:10px;color:var(--gris);margin-bottom:10px;line-height:1.7">
        Importa resultados, goles, tarjetas y sustituciones desde api-sports.io.<br>
        1. Regístrate gratis en <strong style="color:var(--vc)">dashboard.api-sports.io</strong><br>
        2. Copia tu API Key y pégala abajo → Guardar<br>
        Plan gratuito: 100 requests/día · Temporadas 2022–2024

        ✅ Equipo: <strong style="color:white">Deportes Temuco</strong> · ID: 2317 &nbsp;|&nbsp; Liga: <strong style="color:white">Primera B Chile</strong> · ID: 266

      <div class="fg">
        <label>API Key (api-sports.io)</label>
        <input type="password" id="api-key-inp" value="${S.apiF.key}" placeholder="Pega aquí tu API Key"

      <div style="display:flex;gap:8px;margin-top:12px">

function handleBgFile(input){
  const file=input.files[0];if(!file)return
  const reader=new FileReader()
  reader.onload=e=>{S.bgImage=e.target.result;localStorage.setItem('dt-bg',S.bgImage);applyBg();render();toast('Fondo aplicado ✓')}
  reader.readAsDataURL(file)
}
function guardarBg(){
  const url=document.getElementById('bg-url-inp')?.value.trim()
  if(!url){toast('Ingresa una URL',true);return}
  S.bgImage=url;localStorage.setItem('dt-bg',url);applyBg();render();toast('Fondo aplicado ✓')
}
function quitarBg(){S.bgImage='';localStorage.removeItem('dt-bg');applyBg();render();toast('Fondo quitado')}
async function testConnection(){
  try{const r=await get('jugadores','?limit=1');if(Array.isArray(r))toast('Conexión OK ✓');else toast('Error',true)}
  catch(e){toast('Sin conexión',true)}
}

// ===== HISTORIA =====
async function cargarHistoria(){
  const year=S.hist.year
  if(S.hist.data[year]){render();return}
  if(!S.apiF.key){toast('Configura tu API Key en ⚙ Config',true);return}
  S.hist.loading=true;render()
  // 1 request: fixtures del año
  const fixtures=await apiF(`/fixtures?team=${API_F_TEAM}&season=${year}&league=${API_F_LEAGUE}`)
  // 1-2 requests: estadísticas de jugadores
  const players=await apiF(`/players?team=${API_F_TEAM}&season=${year}&league=${API_F_LEAGUE}`)
  if(!fixtures){S.hist.loading=false;render();return}
  S.hist.data[year]={fixtures:fixtures||[],players:players||[]}
  S.hist.loading=false;render()
}

function renderHistoria(){
  const year=S.hist.year
  const years=['2022','2023','2024']
  const d=S.hist.data[year]
  const noKey=!S.apiF.key

  const yearTabs=`<div style="display:flex;gap:6px;margin-bottom:14px">
    ${years.map(y=>`<button class="tab ${year===y?'on':''}" onclick="S.hist.year='${y}';render()">${y}</button>`).join('')}
  </div>`

  if(noKey) return`<div class="content">${yearTabs}
    <div class="empty" style="padding:40px">
      🔑 Configura tu API Key en <strong>⚙ Config</strong> para cargar datos históricos
    </div></div>`

  if(S.hist.loading) return`<div class="content">${yearTabs}
    <div class="empty" style="padding:40px">⏳ Cargando datos ${year}...</div></div>`

  if(!d) return`<div class="content">${yearTabs}
    <div style="text-align:center;padding:40px">
      <p style="color:var(--gris);margin-bottom:14px">Sin datos cargados para ${year}</p>
      <button class="btn" onclick="cargarHistoria()">📥 Cargar temporada ${year}</button>
    </div></div>`

  const fixes=d.fixtures
  const pg=fixes.filter(f=>{const isH=f.teams.home.id===API_F_TEAM;return isH?f.goals.home>f.goals.away:f.goals.away>f.goals.home}).length
  const pe=fixes.filter(f=>f.goals.home===f.goals.away).length
  const pp=fixes.length-pg-pe
  const gf=fixes.reduce((a,f)=>{const isH=f.teams.home.id===API_F_TEAM;return a+(isH?f.goals.home:f.goals.away)},0)
  const gc=fixes.reduce((a,f)=>{const isH=f.teams.home.id===API_F_TEAM;return a+(isH?f.goals.away:f.goals.home)},0)
  const pts=pg*3+pe

  // Player stats
  const pstats=d.players.map(p=>{
    const s=p.statistics[0]||{}
    return{
      name:p.player.name,
      photo:p.player.photo,
      pos:s.games?.position||'',
      apps:s.games?.appearences||0,
      mins:s.games?.minutes||0,
      goles:s.goals?.total||0,
      asist:s.goals?.assists||0,
      amarillas:s.cards?.yellow||0,
      rojas:s.cards?.red||0,
    }
  })
  const goleadores=[...pstats].filter(p=>p.goles>0).sort((a,b)=>b.goles-a.goles).slice(0,8)
  const asistidores=[...pstats].filter(p=>p.asist>0).sort((a,b)=>b.asist-a.asist).slice(0,8)
  const disciplina=[...pstats].filter(p=>p.amarillas>0||p.rojas>0).sort((a,b)=>(b.amarillas+b.rojas*3)-(a.amarillas+a.rojas*3)).slice(0,8)
  const minutos=[...pstats].filter(p=>p.mins>0).sort((a,b)=>b.mins-a.mins).slice(0,8)

  // Last 10 matches form
  const forma=[...fixes].slice(-10).map(f=>{
    const isH=f.teams.home.id===API_F_TEAM
    const gf2=isH?f.goals.home:f.goals.away
    const gc2=isH?f.goals.away:f.goals.home
    const r=gf2>gc2?'W':gf2===gc2?'D':'L'
    const rival=isH?f.teams.away.name:f.teams.home.name
    return`<span class="form-dot ${r}" title="${rival} ${gf2}-${gc2}">${r}</span>`
  }).join('')

  // All matches
  const partidos=[...fixes].reverse().map(f=>{
    const isH=f.teams.home.id===API_F_TEAM
    const gf2=isH?f.goals.home:f.goals.away
    const gc2=isH?f.goals.away:f.goals.home
    const rival=isH?f.teams.away.name:f.teams.home.name
    const cond=isH?'Local':'Visita'
    const res=gf2>gc2?'W':gf2===gc2?'D':'L'
    const rb=res==='W'?'bv':res==='D'?'ba':'br'
    const fecha=f.fixture.date?.split('T')[0]||''
    return`<tr>
      <td style="color:var(--gris);font-size:10px">${fecha}</td>
      <td>${rival}</td>
      <td class="center"><span class="badge ${cond==='Local'?'baz':'bg'}" style="font-size:8px">${cond}</span></td>
      <td class="center" style="font-weight:800;color:var(--vc)">${gf2}-${gc2}</td>
      <td class="center"><span class="badge ${rb}" style="font-size:8px">${res==='W'?'V':res==='D'?'E':'D'}</span></td>
    </tr>`
  }).join('')

  return`<div class="content">
    ${yearTabs}
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <span style="font-size:11px;font-weight:700;color:var(--vc)">Temporada ${year} — Primera B Chile</span>
      <button class="bsm" onclick="S.hist.data['${year}']=null;cargarHistoria()">↺ Recargar</button>
    </div>
    <div class="g4">
      <div class="mc verde"><div class="mc-l">Puntos</div><div class="mc-v">${pts}</div><div class="mc-s">${pg}G · ${pe}E · ${pp}D</div></div>
      <div class="mc"><div class="mc-l">Partidos</div><div class="mc-v">${fixes.length}</div><div class="mc-s">${pg} ganados</div></div>
      <div class="mc az"><div class="mc-l">Goles F / C</div><div class="mc-v">${gf}/${gc}</div><div class="mc-s">Dif: ${gf-gc>0?'+':''}${gf-gc}</div></div>
      <div class="mc am"><div class="mc-l">Prom. goles</div><div class="mc-v">${fixes.length>0?(gf/fixes.length).toFixed(1):'0'}</div><div class="mc-s">por partido</div></div>
    </div>
    <div class="panel" style="margin-bottom:12px">
      <div class="ph"><span class="pt">Últimos 10 partidos</span></div>
      <div class="pb" style="display:flex;gap:4px;flex-wrap:wrap">${forma||'<span style="color:var(--gris);font-size:11px">Sin datos</span>'}</div>
    </div>
    <div class="g2">
      <div class="panel"><div class="ph"><span class="pt">⚽ Goleadores</span></div>
        <table><thead><tr><th>Jugador</th><th class="num">G</th><th class="num">PJ</th></tr></thead><tbody>
        ${goleadores.map((p,i)=>`<tr>
          <td><span style="color:var(--am);font-weight:800;margin-right:4px">${i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.'}</span>${p.name}</td>
          <td class="num" style="color:var(--vc);font-weight:800">${p.goles}</td>
          <td class="num" style="color:var(--gris)">${p.apps}</td>
        </tr>`).join('')||'<tr><td colspan="3" class="empty">Sin datos</td></tr>'}
        </tbody></table>
      </div>
      <div class="panel"><div class="ph"><span class="pt">🅰️ Asistidores</span></div>
        <table><thead><tr><th>Jugador</th><th class="num">A</th><th class="num">PJ</th></tr></thead><tbody>
        ${asistidores.map((p,i)=>`<tr>
          <td><span style="color:var(--am);font-weight:800;margin-right:4px">${i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.'}</span>${p.name}</td>
          <td class="num" style="color:var(--az);font-weight:800">${p.asist}</td>
          <td class="num" style="color:var(--gris)">${p.apps}</td>
        </tr>`).join('')||'<tr><td colspan="3" class="empty">Sin datos</td></tr>'}
        </tbody></table>
      </div>
    </div>
    <div class="g2">
      <div class="panel"><div class="ph"><span class="pt">⏱ Más minutos</span></div>
        <table><thead><tr><th>Jugador</th><th class="num">Min</th><th class="num">PJ</th></tr></thead><tbody>
        ${minutos.map(p=>`<tr>
          <td>${p.name}</td>
          <td class="num" style="color:var(--vc);font-weight:800">${p.mins}'</td>
          <td class="num" style="color:var(--gris)">${p.apps}</td>
        </tr>`).join('')||'<tr><td colspan="3" class="empty">Sin datos</td></tr>'}
        </tbody></table>
      </div>
      <div class="panel"><div class="ph"><span class="pt">🟡 Disciplina</span></div>
        <table><thead><tr><th>Jugador</th><th class="num">🟡</th><th class="num">🔴</th></tr></thead><tbody>
        ${disciplina.map(p=>`<tr>
          <td>${p.name}</td>
          <td class="num" style="color:var(--am)">${p.amarillas}</td>
          <td class="num" style="color:#ff8888">${p.rojas}</td>
        </tr>`).join('')||'<tr><td colspan="3" class="empty">Sin tarjetas</td></tr>'}
        </tbody></table>
      </div>
    </div>
    <div class="panel">
      <div class="ph"><span class="pt">Todos los partidos ${year}</span><span style="font-size:10px;color:var(--gris)">${fixes.length} partidos</span></div>
      <div style="max-height:380px;overflow-y:auto">
        <table><thead><tr><th>Fecha</th><th>Rival</th><th class="center">Cond.</th><th class="center">Res.</th><th class="center">R</th></tr></thead>
        <tbody>${partidos||'<tr><td colspan="5" class="empty">Sin partidos</td></tr>'}</tbody></table>
      </div>
    </div>
  </div>`
}

// ===== RENDER =====
function render(){
  const root=document.getElementById('root')
  if(S.pag==='login'){root.innerHTML=renderLogin();return}
  root.innerHTML=`<div id="app">${renderHdr()}${renderNav()}${
    S.pag==='registro'?renderRegistro():
    S.pag==='plantilla'?renderPlantilla():
    S.pag==='partidos'?renderPartidos():
    S.pag==='estadisticas'?renderEstadisticas():
    S.pag==='config'?renderConfig():
    S.pag==='historia'?renderHistoria():
    renderMedico()
  }</div>`
}

applyBg();render()
</script>
