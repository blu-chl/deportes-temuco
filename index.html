<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deportes Temuco 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --v:#1a7a3c;--vc:#2ea84f;--vo:#0d2e18;
  --am:#e8b84b;--ro:#cc4444;--az:#378ADD;
  --fondo:#080f09;--panel:#0c1a0e;
  --borde:rgba(46,168,79,0.18);--borde2:rgba(46,168,79,0.32);
  --gris:#7a9a7a;--muted:#5a7a5a;--blanco:#eef4ee;
  --font:'Trebuchet MS',sans-serif;
}
html,body{min-height:100vh;background:var(--fondo);color:var(--blanco);font-family:var(--font);font-size:13px}
#app{max-width:1100px;margin:0 auto;background:var(--fondo);border-radius:12px;border:1px solid var(--borde2);overflow:hidden;min-height:100vh}
.hdr{background:var(--vo);border-bottom:1px solid var(--borde2);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.esc{width:40px;height:40px;background:var(--v);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;border:2px solid var(--vc)}
.lt h1{font-size:15px;font-weight:700;line-height:1}.lt p{font-size:10px;color:var(--gris)}
.hstats{display:flex;gap:14px}
.hs{text-align:center}
.hs-v{font-size:20px;font-weight:800;color:var(--vc);line-height:1}
.hs-l{font-size:9px;color:var(--gris);text-transform:uppercase}
nav{background:rgba(0,0,0,0.35);border-bottom:1px solid var(--borde);display:flex;overflow-x:auto}
.nb{padding:10px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;border:none;background:none;color:var(--gris);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:var(--font)}
.nb:hover{color:var(--blanco)}.nb.on{color:var(--vc);border-bottom-color:var(--vc)}
.content{padding:14px 16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
@media(max-width:600px){.g2,.g4{grid-template-columns:1fr}.hstats{display:none}}
.mc{background:rgba(255,255,255,0.04);border:1px solid var(--borde);border-radius:8px;padding:12px 14px}
.mc-l{font-size:9px;color:var(--gris);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.mc-v{font-size:24px;font-weight:800;color:white;line-height:1}
.mc-s{font-size:10px;color:var(--muted);margin-top:2px}
.mc.verde .mc-v{color:var(--vc)}.mc.am .mc-v{color:var(--am)}.mc.ro .mc-v{color:var(--ro)}
.panel{background:var(--panel);border:1px solid var(--borde);border-radius:8px;margin-bottom:12px;overflow:hidden}
.ph{padding:10px 14px;border-bottom:1px solid var(--borde);display:flex;align-items:center;justify-content:space-between}
.pt{font-size:11px;font-weight:700;color:var(--vc);text-transform:uppercase;letter-spacing:.8px}
.pb{padding:12px 14px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:6px 8px;color:var(--gris);font-size:9px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--borde);font-weight:600}
td{padding:8px 8px;border-bottom:1px solid rgba(46,168,79,0.06);color:var(--blanco)}
tr:hover td{background:rgba(46,168,79,0.05)}
.num{text-align:right}.center{text-align:center}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700}
.bv{background:rgba(46,168,79,0.18);color:var(--vc)}
.br{background:rgba(204,68,68,0.18);color:#ff8888}
.ba{background:rgba(232,184,75,0.18);color:var(--am)}
.bg{background:rgba(122,154,122,0.15);color:var(--gris)}
.baz{background:rgba(55,138,221,0.18);color:#88bbee}
.btn{background:var(--v);border:none;border-radius:6px;padding:7px 14px;color:white;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);text-transform:uppercase;letter-spacing:.5px}
.btn:hover{background:var(--vc)}.btn:disabled{opacity:.5;cursor:not-allowed}
.bsm{background:rgba(46,168,79,0.12);border:1px solid var(--borde2);border-radius:5px;padding:4px 10px;color:var(--vc);font-size:10px;font-weight:700;cursor:pointer;font-family:var(--font)}
.bsm:hover{background:rgba(46,168,79,0.25)}
.bdel{background:rgba(204,68,68,0.12);border:1px solid rgba(204,68,68,0.3);border-radius:5px;padding:4px 10px;color:#ff8888;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--font)}
.bdel:hover{background:rgba(204,68,68,0.25)}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:9px;color:var(--gris);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.fg input,.fg select{width:100%;background:rgba(0,0,0,0.5);border:1px solid var(--borde2);border-radius:6px;padding:7px 10px;color:white;font-size:12px;font-family:var(--font)}
.fg select option{background:#0d2e18}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--vc)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.pcard{background:rgba(255,255,255,0.04);border:1px solid var(--borde);border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.pcard:hover,.pcard.sel{border-color:var(--vc)}.pcard.sel{background:rgba(46,168,79,0.06)}
.rbox{display:flex;align-items:center;justify-content:center;gap:14px;background:rgba(0,0,0,0.3);border-radius:6px;padding:8px;margin:6px 0}
.rscore{font-size:26px;font-weight:800;color:var(--vc)}
.rsep{font-size:18px;color:var(--borde2)}
.req{font-size:11px;color:var(--gris);flex:1;text-align:center}
.jcard{background:rgba(255,255,255,0.04);border:1px solid var(--borde);border-radius:8px;padding:12px;transition:border-color .2s}
.jcard:hover{border-color:var(--vc)}
.jav{width:38px;height:38px;border-radius:50%;background:var(--vo);border:2px solid var(--v);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--vc);flex-shrink:0}
.pos-POR{background:rgba(232,184,75,.2);color:var(--am);display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:800}
.pos-DEF{background:rgba(55,138,221,.2);color:#88bbee;display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:800}
.pos-MED{background:rgba(46,168,79,.2);color:var(--vc);display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:800}
.pos-DEL{background:rgba(204,68,68,.2);color:#ff8888;display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:800}
.ev{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(46,168,79,.06)}
.ev-min{font-size:12px;font-weight:800;color:var(--am);min-width:28px}
.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.tab{padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--borde2);color:var(--gris);background:transparent;font-family:var(--font);text-transform:uppercase}
.tab.on{background:var(--v);color:white;border-color:var(--v)}
.bar-w{background:rgba(0,0,0,.3);border-radius:3px;height:4px;overflow:hidden;margin-top:3px}
.bar-f{height:4px;border-radius:3px;background:var(--vc)}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:12px}
.toast{background:var(--v);color:white;padding:9px 14px;border-radius:7px;font-size:12px;font-weight:700;position:fixed;bottom:16px;right:16px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}.toast.err{background:var(--ro)}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#0d2e18,var(--fondo) 65%)}
.login-card{background:var(--panel);border:1px solid var(--borde2);border-radius:12px;padding:36px 32px;width:320px;text-align:center}
.lerr{background:rgba(204,68,68,.15);border:1px solid rgba(204,68,68,.3);color:#ff8888;padding:8px 12px;border-radius:6px;font-size:11px;margin-bottom:12px}
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#0d1f10;border:1px solid var(--borde2);border-radius:12px;padding:24px;width:360px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-titulo{font-size:13px;font-weight:700;color:var(--vc);text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<div id="modal-root"></div>
<script>
const SB_URL='https://vskhzbstwadaabzyhzwh.supabase.co'
const SB_KEY='sb_publishable_Xpm4vH8few7gjsDcIM_2qA_3rjYFHeu'
let AUTH_TOKEN=SB_KEY
const hdrs=()=>({'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+AUTH_TOKEN,'Prefer':'return=representation'})

async function sb(method,table,body,params=''){
  const r=await fetch(`${SB_URL}/rest/v1/${table}${params}`,{method,headers:hdrs(),body:body?JSON.stringify(body):undefined})
  const t=await r.text();try{return JSON.parse(t)}catch(e){return[]}
}
const get=(t,p='')=>sb('GET',t,null,p)
const post=(t,b)=>sb('POST',t,b)
const patch=(t,b,p)=>sb('PATCH',t,b,p)
const del=(t,p)=>sb('DELETE',t,null,p)

function toast(msg,err=false){
  const el=document.getElementById('toast')
  el.textContent=msg;el.className='toast show'+(err?' err':'')
  setTimeout(()=>el.className='toast',2500)
}
function hoy(){return new Date().toISOString().split('T')[0]}

const ICONOS={Gol:'⚽',Asistencia:'🅰️',Amarilla:'🟡',Roja:'🔴','Sustitución':'🔄'}
const TIPOS_ASIST=['Centro','Pase Filtrado','Córner','Balón Parado']
let TIPOS_GOL=['Pie Derecho','Pie Izquierdo','Cabeza','Tiro Libre','Penal']

let S={
  pag:'login',jugadores:[],partidos:[],eventos:[],lesiones:[],
  partidoActivo:null,evPartido:[],
  filtPos:'todos',filtComp:'todos',filtCompEst:'todos',
  npShow:false,addJugShow:false,lesShow:false,
  editTiposGol:false,nuevoTipoGol:'',
  np:{rival:'',competencia:'Primera B',condicion:'Local',fecha:hoy(),goles_favor:0,goles_contra:0},
  ev:{minuto:1,tipo:'Gol',subtipo:'Pie Derecho',jugador_id:'',jugador_sale_id:''},
  addJug:{numero:'',nombre:'',posicion:'MED',edad:22,pie:'Derecho'},
  addLes:{jugador_id:'',tipo:'Desgarro muscular',fecha_inicio:hoy(),semanas_recuperacion:3},
  minutaje:{},
}

async function cargarDatos(){
  const[jugs,parts,evs,less]=await Promise.all([
    get('jugadores','?activo=eq.true&order=numero'),
    get('partidos','?order=fecha'),
    get('eventos','?order=minuto'),
    get('lesiones','?alta=eq.false'),
  ])
  S.jugadores=Array.isArray(jugs)?jugs:[]
  S.partidos=Array.isArray(parts)?parts:[]
  S.eventos=Array.isArray(evs)?evs:[]
  S.lesiones=Array.isArray(less)?less:[]
  if(S.jugadores.length){S.ev.jugador_id=S.jugadores[0].id;S.ev.jugador_sale_id=S.jugadores[0].id;S.addLes.jugador_id=S.jugadores[0].id}
  render()
}

function jugNombre(id){const j=S.jugadores.find(x=>x.id===id);return j?j.nombre:'?'}

function getStats(jugId){
  const evs=S.eventos.filter(e=>e.jugador_id===jugId)
  const mins=S.partidos.reduce((a,p)=>a+(S.eventos.some(e=>e.partido_id===p.id&&e.jugador_id===jugId)?90:0),0)
  return{goles:evs.filter(e=>e.tipo==='Gol').length,asist:evs.filter(e=>e.tipo==='Asistencia').length,minutos:mins}
}

function calcHdr(){
  const p=S.partidos
  const pg=p.filter(x=>x.goles_favor>x.goles_contra).length
  const pe=p.filter(x=>x.goles_favor===x.goles_contra).length
  const pp=p.filter(x=>x.goles_favor<x.goles_contra).length
  return{pg,pe,pp,pts:pg*3+pe,gf:p.reduce((a,x)=>a+x.goles_favor,0),gc:p.reduce((a,x)=>a+x.goles_contra,0)}
}

// ===== LOGIN =====
function renderLogin(){
  return`<div class="login-wrap"><div class="login-card">
    <div style="width:52px;height:52px;background:var(--v);border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;border:2px solid var(--vc)">DT</div>
    <div style="font-size:20px;font-weight:800;margin-bottom:4px">Deportes Temuco</div>
    <div style="font-size:11px;color:var(--gris);margin-bottom:24px">Temporada 2026 — Acceso privado</div>
    <div id="lerr" style="display:none" class="lerr"></div>
    <div class="fg"><label>Correo</label><input id="l-email" type="email" placeholder="tu@correo.com"></div>
    <div class="fg"><label>Contraseña</label><input id="l-pass" type="password" placeholder="••••••••"></div>
    <button class="btn" style="width:100%;margin-top:6px" onclick="doLogin()" id="l-btn">Ingresar</button>
    <p style="margin-top:16px;font-size:10px;color:var(--gris)">Acceso restringido al cuerpo técnico</p>
  </div></div>`
}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim()
  const pass=document.getElementById('l-pass').value
  const btn=document.getElementById('l-btn'),err=document.getElementById('lerr')
  if(!email||!pass){err.textContent='Completa todos los campos';err.style.display='block';return}
  btn.textContent='Ingresando...';btn.disabled=true
  const r=await fetch(`${SB_URL}/auth/v1/token?grant_type=password`,{
    method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY},
    body:JSON.stringify({email,password:pass})
  })
  const d=await r.json()
  if(d.access_token){AUTH_TOKEN=d.access_token;S.pag='registro';await cargarDatos()}
  else{err.textContent='Correo o contraseña incorrectos';err.style.display='block';btn.textContent='Ingresar';btn.disabled=false}
}

function doLogout(){AUTH_TOKEN=SB_KEY;S.pag='login';render()}
function navTo(p){S.pag=p;render()}

function renderHdr(){
  const s=calcHdr()
  return`<div class="hdr">
    <div class="logo"><div class="esc">DT</div><div class="lt"><h1>Deportes Temuco</h1><p>Temporada 2026</p></div></div>
    <div class="hstats">
      <div class="hs"><div class="hs-v">${s.pts}</div><div class="hs-l">Pts</div></div>
      <div class="hs"><div class="hs-v">${s.pg}</div><div class="hs-l">G</div></div>
      <div class="hs"><div class="hs-v">${s.pe}</div><div class="hs-l">E</div></div>
      <div class="hs"><div class="hs-v">${s.pp}</div><div class="hs-l">D</div></div>
      <div class="hs"><div class="hs-v">${s.gf}</div><div class="hs-l">GF</div></div>
      <div class="hs"><div class="hs-v">${s.gc}</div><div class="hs-l">GC</div></div>
    </div>
    <button class="bsm" onclick="doLogout()">Salir</button>
  </div>`
}

function renderNav(){
  return`<nav>${[{id:'registro',l:'Registro'},{id:'plantilla',l:'Plantilla'},{id:'partidos',l:'Partidos'},{id:'estadisticas',l:'Estadísticas'},{id:'medico',l:'Médico'}]
    .map(t=>`<button class="nb ${S.pag===t.id?'on':''}" onclick="navTo('${t.id}')">${t.l}</button>`).join('')}</nav>`
}

// ===== MODALES =====
function cerrarModal(){document.getElementById('modal-root').innerHTML=''}

function abrirEditarJugador(id){
  const j=S.jugadores.find(x=>x.id===id);if(!j)return
  document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)cerrarModal()">
    <div class="modal">
      <div class="modal-titulo">✏️ Editar jugador</div>
      <div class="fg"><label>Nombre</label><input id="ej-nom" value="${j.nombre}"></div>
      <div class="fr2">
        <div class="fg"><label>Número</label><input id="ej-num" type="number" value="${j.numero}" min="1" max="99"></div>
        <div class="fg"><label>Edad</label><input id="ej-edad" type="number" value="${j.edad}" min="15" max="45"></div>
      </div>
      <div class="fr2">
        <div class="fg"><label>Posición</label><select id="ej-pos">${['POR','DEF','MED','DEL'].map(p=>`<option ${j.posicion===p?'selected':''}>${p}</option>`).join('')}</select></div>
        <div class="fg"><label>Pie</label><select id="ej-pie">${['Derecho','Izquierdo','Ambidiestro'].map(p=>`<option ${j.pie===p?'selected':''}>${p}</option>`).join('')}</select></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
        <button class="btn" onclick="guardarEdicionJugador(${j.id})">Guardar</button>
        <button class="bsm" onclick="cerrarModal()">Cancelar</button>
        <button class="bdel" style="margin-left:auto" onclick="confirmarBorrarJugador(${j.id},'${j.nombre.replace(/'/g,"\\'")}')">🗑 Eliminar</button>
      </div>
    </div>
  </div>`
}

function confirmarBorrarJugador(id,nombre){
  document.getElementById('modal-root').innerHTML=`<div class="modal-bg"><div class="modal">
    <div class="modal-titulo" style="color:var(--ro)">⚠️ Eliminar jugador</div>
    <p style="font-size:13px;margin-bottom:18px;color:var(--gris)">¿Eliminar a <strong style="color:white">${nombre}</strong>? No se puede deshacer.</p>
    <div style="display:flex;gap:8px">
      <button class="bdel" onclick="borrarJugador(${id})">Sí, eliminar</button>
      <button class="bsm" onclick="cerrarModal()">Cancelar</button>
    </div>
  </div></div>`
}

async function guardarEdicionJugador(id){
  const nom=document.getElementById('ej-nom').value.trim()
  const num=+document.getElementById('ej-num').value
  const edad=+document.getElementById('ej-edad').value
  const pos=document.getElementById('ej-pos').value
  const pie=document.getElementById('ej-pie').value
  if(!nom){toast('El nombre no puede estar vacío',true);return}
  await patch('jugadores',{nombre:nom,numero:num,edad,posicion:pos,pie},`?id=eq.${id}`)
  toast('Jugador actualizado');cerrarModal();await cargarDatos()
}

async function borrarJugador(id){
  await patch('jugadores',{activo:false},`?id=eq.${id}`)
  toast('Jugador eliminado');cerrarModal();await cargarDatos()
}

function abrirEditarPartido(id){
  const p=S.partidos.find(x=>x.id===id);if(!p)return
  document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)cerrarModal()">
    <div class="modal">
      <div class="modal-titulo">✏️ Editar partido</div>
      <div class="fg"><label>Rival</label><input id="ep-rival" value="${p.rival}"></div>
      <div class="fr2">
        <div class="fg"><label>Competencia</label><select id="ep-comp"><option ${p.competencia==='Primera B'?'selected':''}>Primera B</option><option ${p.competencia==='Copa Chile'?'selected':''}>Copa Chile</option></select></div>
        <div class="fg"><label>Condición</label><select id="ep-cond"><option ${p.condicion==='Local'?'selected':''}>Local</option><option ${p.condicion==='Visita'?'selected':''}>Visita</option></select></div>
      </div>
      <div class="fg"><label>Fecha</label><input id="ep-fecha" type="date" value="${p.fecha}"></div>
      <div class="fr2">
        <div class="fg"><label>Goles nuestros</label><input id="ep-gf" type="number" min="0" value="${p.goles_favor}"></div>
        <div class="fg"><label>Goles rival</label><input id="ep-gc" type="number" min="0" value="${p.goles_contra}"></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
        <button class="btn" onclick="guardarEdicionPartido(${p.id})">Guardar</button>
        <button class="bsm" onclick="cerrarModal()">Cancelar</button>
        <button class="bdel" style="margin-left:auto" onclick="confirmarBorrarPartido(${p.id},'${p.rival.replace(/'/g,"\\'")}')">🗑 Eliminar</button>
      </div>
    </div>
  </div>`
}

function confirmarBorrarPartido(id,rival){
  document.getElementById('modal-root').innerHTML=`<div class="modal-bg"><div class="modal">
    <div class="modal-titulo" style="color:var(--ro)">⚠️ Eliminar partido</div>
    <p style="font-size:13px;margin-bottom:18px;color:var(--gris)">¿Eliminar el partido vs <strong style="color:white">${rival}</strong>? Se borrarán todos sus eventos.</p>
    <div style="display:flex;gap:8px">
      <button class="bdel" onclick="borrarPartido(${id})">Sí, eliminar</button>
      <button class="bsm" onclick="cerrarModal()">Cancelar</button>
    </div>
  </div></div>`
}

async function guardarEdicionPartido(id){
  const rival=document.getElementById('ep-rival').value.trim()
  if(!rival){toast('El rival no puede estar vacío',true);return}
  await patch('partidos',{
    rival,competencia:document.getElementById('ep-comp').value,
    condicion:document.getElementById('ep-cond').value,
    fecha:document.getElementById('ep-fecha').value,
    goles_favor:+document.getElementById('ep-gf').value,
    goles_contra:+document.getElementById('ep-gc').value,
  },`?id=eq.${id}`)
  toast('Partido actualizado');cerrarModal();await cargarDatos()
}

async function borrarPartido(id){
  await del('eventos',`?partido_id=eq.${id}`)
  await del('partidos',`?id=eq.${id}`)
  if(S.partidoActivo===id){S.partidoActivo=null;S.evPartido=[]}
  toast('Partido eliminado');cerrarModal();await cargarDatos()
}

async function borrarEvento(id){
  await del('eventos',`?id=eq.${id}`)
  toast('Evento eliminado')
  S.evPartido=S.evPartido.filter(e=>e.id!==id)
  await cargarDatos()
}

async function selPartido(id){
  S.partidoActivo=id;S.minutaje={}
  const[evs,mins]=await Promise.all([
    get('eventos',`?partido_id=eq.${id}&order=minuto`),
    get('minutaje',`?partido_id=eq.${id}`)
  ])
  S.evPartido=Array.isArray(evs)?evs:[]
  if(Array.isArray(mins))mins.forEach(m=>S.minutaje[m.jugador_id]=m.minutos)
  render()
}

async function guardarPartido(){
  if(!S.np.rival.trim()){toast('Ingresa el rival',true);return}
  const r=await post('partidos',S.np)
  if(Array.isArray(r)&&r[0]){
    toast('Partido guardado')
    S.np={rival:'',competencia:'Primera B',condicion:'Local',fecha:hoy(),goles_favor:0,goles_contra:0}
    S.npShow=false;await cargarDatos();await selPartido(r[0].id)
  }else toast('Error al guardar',true)
}

async function agregarEvento(){
  if(!S.partidoActivo){toast('Selecciona un partido',true);return}
  const ev=S.ev
  const r=await post('eventos',{
    partido_id:S.partidoActivo,jugador_id:+ev.jugador_id,tipo:ev.tipo,
    subtipo:['Gol','Asistencia'].includes(ev.tipo)?ev.subtipo:null,
    minuto:+ev.minuto,jugador_sale_id:ev.tipo==='Sustitución'?+ev.jugador_sale_id:null,
  })
  if(Array.isArray(r)&&r[0]){toast('Evento registrado');await cargarDatos();await selPartido(S.partidoActivo)}
  else toast('Error',true)
}

async function guardarMinutaje(){
  if(!S.partidoActivo){toast('Selecciona un partido',true);return}
  const ops=Object.entries(S.minutaje).filter(([,v])=>v>0).map(([jid,minutos])=>
    fetch(`${SB_URL}/rest/v1/minutaje`,{
      method:'POST',
      headers:{...hdrs(),'Prefer':'resolution=merge-duplicates,return=representation'},
      body:JSON.stringify({partido_id:S.partidoActivo,jugador_id:+jid,minutos})
    })
  )
  await Promise.all(ops)
  toast('Minutaje guardado ✓')
}

// ===== ESTADÍSTICAS =====
function renderEstadisticas(){
  const fc=S.filtCompEst
  const partsFilt=fc==='todos'?S.partidos:S.partidos.filter(p=>p.competencia===fc)
  const pidsFilt=new Set(partsFilt.map(p=>p.id))
  const evsFilt=S.eventos.filter(e=>pidsFilt.has(e.partido_id))

  const statsJug=S.jugadores.map(j=>{
    const evJ=evsFilt.filter(e=>e.jugador_id===j.id)
    const goles=evJ.filter(e=>e.tipo==='Gol').length
    const asist=evJ.filter(e=>e.tipo==='Asistencia').length
    const min=partsFilt.reduce((a,p)=>a+(evsFilt.some(e=>e.partido_id===p.id&&e.jugador_id===j.id)?90:0),0)
    return{...j,goles,asist,min,g90:min>0?goles/min*90:0,a90:min>0?asist/min*90:0}
  })

  const goleadores=[...statsJug].filter(j=>j.goles>0).sort((a,b)=>b.g90-a.g90)
  const asistidores=[...statsJug].filter(j=>j.asist>0).sort((a,b)=>b.a90-a.a90)

  const cGol={};TIPOS_GOL.forEach(t=>cGol[t]=0)
  evsFilt.filter(e=>e.tipo==='Gol').forEach(e=>{if(e.subtipo)cGol[e.subtipo]=(cGol[e.subtipo]||0)+1})
  const totG=Math.max(1,Object.values(cGol).reduce((a,b)=>a+b,0))
  const gf=partsFilt.reduce((a,p)=>a+p.goles_favor,0)
  const ta=evsFilt.filter(e=>e.tipo==='Amarilla').length
  const tr=evsFilt.filter(e=>e.tipo==='Roja').length
  const pz=partsFilt.filter(p=>p.goles_contra===0).length

  const panelTiposGol=S.editTiposGol?`<div class="panel" style="margin-bottom:12px">
    <div class="ph"><span class="pt">⚙️ Gestionar tipos de gol</span><button class="bsm" onclick="S.editTiposGol=false;render()">Cerrar</button></div>
    <div class="pb">
      ${TIPOS_GOL.map((t,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--borde)">
        <span style="flex:1;font-size:12px">${t}</span>
        <span style="font-size:10px;color:var(--gris);min-width:50px">${cGol[t]||0} goles</span>
        <button class="bdel" style="padding:3px 8px;font-size:10px" onclick="eliminarTipoGol(${i})">✕ Quitar</button>
      </div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:12px">
        <input id="inp-tipo-gol" placeholder="Nuevo tipo, ej: Chilena..." value="${S.nuevoTipoGol}"
          style="flex:1;background:rgba(0,0,0,.5);border:1px solid var(--borde2);border-radius:6px;padding:7px 10px;color:white;font-size:12px;font-family:var(--font)"
          oninput="S.nuevoTipoGol=this.value" onkeydown="if(event.key==='Enter')agregarTipoGol()">
        <button class="btn" onclick="agregarTipoGol()">+ Agregar</button>
      </div>
    </div>
  </div>`:''

  return`<div class="content">
    <div class="tabs">${['todos','Primera B','Copa Chile'].map(c=>`<button class="tab ${S.filtCompEst===c?'on':''}" onclick="S.filtCompEst='${c}';render()">${c==='todos'?'Todas':c}</button>`).join('')}</div>
    <div class="g4">
      <div class="mc verde"><div class="mc-l">Goles/partido</div><div class="mc-v">${partsFilt.length>0?(gf/partsFilt.length).toFixed(2):'0.00'}</div></div>
      <div class="mc"><div class="mc-l">Porterías en 0</div><div class="mc-v">${pz}</div></div>
      <div class="mc am"><div class="mc-l">Amarillas</div><div class="mc-v">${ta}</div></div>
      <div class="mc ro"><div class="mc-l">Rojas</div><div class="mc-v">${tr}</div></div>
    </div>
    <div class="g2">
      <div class="panel"><div class="ph"><span class="pt">Goleadores G/90</span></div>
        <table><thead><tr><th>Jugador</th><th class="num">G</th><th class="num">Min</th><th class="num">G/90</th></tr></thead><tbody>
        ${goleadores.slice(0,8).map(j=>`<tr><td>${j.nombre}</td><td class="num">${j.goles}</td><td class="num">${j.min}'</td><td class="num" style="color:var(--vc);font-weight:800">${j.g90.toFixed(2)}</td></tr>`).join('')||`<tr><td colspan="4" style="text-align:center;color:var(--gris);padding:12px">Sin goles registrados</td></tr>`}
        </tbody></table>
      </div>
      <div class="panel"><div class="ph"><span class="pt">Asistidores A/90</span></div>
        <table><thead><tr><th>Jugador</th><th class="num">A</th><th class="num">Min</th><th class="num">A/90</th></tr></thead><tbody>
        ${asistidores.slice(0,8).map(j=>`<tr><td>${j.nombre}</td><td class="num">${j.asist}</td><td class="num">${j.min}'</td><td class="num" style="color:var(--az);font-weight:800">${j.a90.toFixed(2)}</td></tr>`).join('')||`<tr><td colspan="4" style="text-align:center;color:var(--gris);padding:12px">Sin asistencias registradas</td></tr>`}
        </tbody></table>
      </div>
    </div>
    ${panelTiposGol}
    <div class="panel">
      <div class="ph">
        <span class="pt">Desglose de goles</span>
        <button class="bsm" onclick="S.editTiposGol=!S.editTiposGol;render()">⚙️ Gestionar tipos</button>
      </div>
      <div class="pb">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px">
          ${TIPOS_GOL.map(t=>{const pct=Math.round((cGol[t]||0)/totG*100);return`<div class="mc"><div class="mc-l">${t}</div><div class="mc-v" style="font-size:20px">${cGol[t]||0}</div><div class="bar-w"><div class="bar-f" style="width:${pct}%"></div></div><div class="mc-s">${pct}%</div></div>`}).join('')}
        </div>
      </div>
    </div>
  </div>`
}

function agregarTipoGol(){
  const val=S.nuevoTipoGol.trim()
  if(!val){toast('Escribe un nombre para el tipo',true);return}
  if(TIPOS_GOL.includes(val)){toast('Ese tipo ya existe',true);return}
  TIPOS_GOL.push(val);S.nuevoTipoGol='';render();toast('Tipo "'+val+'" agregado')
}

function eliminarTipoGol(i){
  const tipo=TIPOS_GOL[i]
  const enUso=S.eventos.some(e=>e.subtipo===tipo&&e.tipo==='Gol')
  if(enUso){toast('No se puede eliminar — hay goles registrados con este tipo',true);return}
  TIPOS_GOL.splice(i,1);render();toast('Tipo eliminado')
}

// ===== MÉDICO =====
function renderMedico(){
  const les=S.lesiones
  const jugOpts=S.jugadores.map(j=>`<option value="${j.id}">#${j.numero} ${j.nombre}</option>`).join('')
  const addForm=S.lesShow?`<div style="padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--borde)">
    <div class="fg"><label>Jugador</label><select onchange="S.addLes.jugador_id=+this.value">${jugOpts}</select></div>
    <div class="fg"><label>Tipo de lesión</label><select onchange="S.addLes.tipo=this.value">
      ${['Desgarro muscular','Esguince','Fractura','Contusión','Rotura de ligamentos','Sobrecarga','Otro'].map(t=>`<option>${t}</option>`).join('')}
    </select></div>
    <div class="fr2">
      <div class="fg" style="margin-bottom:0"><label>Fecha inicio</label><input type="date" value="${S.addLes.fecha_inicio}" oninput="S.addLes.fecha_inicio=this.value"></div>
      <div class="fg" style="margin-bottom:0"><label>Semanas</label><input type="number" min="1" max="52" value="${S.addLes.semanas_recuperacion}" oninput="S.addLes.semanas_recuperacion=+this.value"></div>
    </div>
    <div style="display:flex;gap:6px;margin-top:10px"><button class="btn" onclick="guardarLesion()">Guardar</button><button class="bsm" onclick="S.lesShow=false;render()">Cancelar</button></div>
  </div>`:''

  const lesCards=les.map(l=>{
    const j=S.jugadores.find(x=>x.id===l.jugador_id)
    const inicio=new Date(l.fecha_inicio)
    const alta=new Date(inicio);alta.setDate(alta.getDate()+l.semanas_recuperacion*7)
    const dias=Math.max(0,Math.ceil((alta-new Date())/86400000))
    const pct=Math.min(100,Math.round(dias/(l.semanas_recuperacion*7)*100))
    return`<div class="pcard" style="cursor:default;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div style="font-size:14px;font-weight:700">${j?.nombre||'?'}</div><div style="font-size:10px;color:var(--gris)">${l.tipo} · Alta estimada: ${alta.toLocaleDateString('es-CL')}</div></div>
        <div style="text-align:right"><div style="font-size:20px;font-weight:800;color:var(--ro)">${dias}</div><div style="font-size:9px;color:var(--gris)">días restantes</div></div>
      </div>
      <div class="bar-w" style="margin-top:6px"><div class="bar-f" style="width:${pct}%;background:var(--ro)"></div></div>
      <button class="bsm" style="margin-top:8px" onclick="darAlta(${l.id})">✅ Dar alta</button>
    </div>`
  }).join('')

  const dispTabla=S.jugadores.map(j=>{
    const lesion=les.find(l=>l.jugador_id===j.id)
    return`<tr><td>#${j.numero} ${j.nombre}</td><td><span class="pos-${j.posicion}">${j.posicion}</span></td><td class="center"><span class="badge ${lesion?'br':'bv'}">${lesion?'Lesionado':'Disponible'}</span></td></tr>`
  }).join('')

  return`<div class="content"><div class="g2">
    <div><div class="panel">
      <div class="ph"><span class="pt">Lesiones activas</span><button class="bsm" onclick="S.lesShow=!S.lesShow;render()">+ Registrar</button></div>
      <div class="pb">${addForm}${les.length?lesCards:'<div class="empty">💪 Sin lesiones activas</div>'}</div>
    </div></div>
    <div><div class="panel">
      <div class="ph"><span class="pt">Disponibilidad plantilla</span></div>
      <table><thead><tr><th>Jugador</th><th>Pos</th><th class="center">Estado</th></tr></thead><tbody>${dispTabla}</tbody></table>
    </div></div>
  </div></div>`
}

async function guardarLesion(){
  const l=S.addLes
  if(!l.jugador_id){toast('Selecciona jugador',true);return}
  const r=await post('lesiones',{...l,jugador_id:+l.jugador_id,semanas_recuperacion:+l.semanas_recuperacion})
  if(Array.isArray(r)&&r[0]){toast('Lesión registrada');S.lesShow=false;await cargarDatos()}
  else toast('Error',true)
}

async function darAlta(id){
  await patch('lesiones',{alta:true,fecha_alta:hoy()},`?id=eq.${id}`)
  toast('Jugador dado de alta ✅');await cargarDatos()
}

// ===== RENDER =====
function render(){
  const root=document.getElementById('root')
  if(S.pag==='login'){root.innerHTML=renderLogin();return}
  root.innerHTML=`<div id="app">${renderHdr()}${renderNav()}${
    S.pag==='registro'?renderRegistro():
    S.pag==='plantilla'?renderPlantilla():
    S.pag==='partidos'?renderPartidos():
    S.pag==='estadisticas'?renderEstadisticas():
    renderMedico()
  }</div>`
}

render()
</script>
</body>
</html>
