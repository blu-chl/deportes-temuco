async function sb(method,table,body,params=''){

function parseFormacion(str){
  const parts=str.trim().split('-').map(Number)
  if(parts.length<2||parts.some(isNaN)||parts.some(n=>n<1))return null
  if(parts.reduce((a,b)=>a+b,0)!==10)return null
  const lineas=[{pos:'POR',n:1}]
  parts.forEach((n,i)=>{
    if(i===0)lineas.push({pos:'DEF',n})
    else if(i===parts.length-1)lineas.push({pos:'DEL',n})
    else lineas.push({pos:'MED',n})
  })
  return lineas
}

function aplicarFormacionCustom(){
  const inp=document.getElementById('form-custom-inp');if(!inp)return
  const str=inp.value.trim().replace(/\s+/g,'')
  if(!str)return
  const parsed=parseFormacion(str)
  if(!parsed){toast('Debe sumar 10 (ej: 4-3-3, 3-4-1-2)',true);return}
  FORMACIONES[str]=parsed
  S.formacion=str
  S.titulares=[]
  // Guardar formaciones custom en localStorage
  const customs=JSON.parse(localStorage.getItem('dt-formaciones')||'{}')
  customs[str]=parsed
  localStorage.setItem('dt-formaciones',JSON.stringify(customs))
  render();toast(`Formación ${str} guardada ✓`)
}

// Cargar formaciones custom guardadas

function calcMinutajeAuto(titularIds,evs,duracion=90){
  const mins={}
  const entradas={}  // minuto en que entró cada jugador
  titularIds.forEach(id=>{if(id){mins[id]=duracion;entradas[id]=0}})
  evs.filter(e=>e.tipo==='Sustitución').sort((a,b)=>a.minuto-b.minuto).forEach(sub=>{
    const min=sub.minuto||0
    // El que sale: minutos reales = minuto_salida - minuto_entrada
    if(sub.jugador_sale_id!=null&&mins[sub.jugador_sale_id]!==undefined)
      mins[sub.jugador_sale_id]=min-(entradas[sub.jugador_sale_id]??0)
    // El que entra: registrar su minuto de entrada y calcular minutos disponibles
    if(sub.jugador_id!=null){
      entradas[sub.jugador_id]=min
      mins[sub.jugador_id]=duracion-min
    }
  })
  return mins
}

// Helpers para nombre
function jugNombre(id){const j=S.jugadores.find(x=>x.id===id);return j?j.nombre:'?'}
function jugFoto(id){const j=S.jugadores.find(x=>x.id===id);return j?.foto_url||''}
function jugApellido(id){
  const j=S.jugadores.find(x=>x.id===id);if(!j)return'?'
  const p=j.nombre.trim().split(' ')
  return p.length>1?p.slice(1).join(' '):p[0]

function fmtValor(v){
  if(!v&&v!==0)return'-'
  const m=S.moneda||'€'
  const num=(+v).toLocaleString('es-CL')
  return m==='CLP'?`$${num} CLP`:`${m}${num}`
}

// Label para dropdowns según modo de ordenamiento
function jugOpts(){
  let lista=[...S.jugadores]
  if(S.ordenJug==='apellido'){
    lista.sort((a,b)=>{
      const aa=a.nombre.split(' ').slice(1).join(' ')||a.nombre
      const bb=b.nombre.split(' ').slice(1).join(' ')||b.nombre
      return aa.localeCompare(bb)
    })
  }else{
    lista.sort((a,b)=>a.numero-b.numero)
  }
  return lista.map(j=>{
    const ap=j.nombre.trim().split(' ').slice(1).join(' ')||j.nombre
    return`<option value="${j.id}">${j.numero} ${ap}</option>`
  }).join('')
}

async function cargarDatos(){
  const[jugs,parts,evs,less,nts,mins]=await Promise.all([
    get('jugadores','?activo=eq.true&order=numero'),
    get('partidos','?order=fecha'),
    get('eventos','?order=minuto'),
    get('lesiones','?alta=eq.false'),
    get('notas','?order=created_at.desc'),
    get('minutaje','?order=partido_id'),
  ])
  S.jugadores=Array.isArray(jugs)?jugs:[]
  S.partidos=Array.isArray(parts)?parts:[]
  S.eventos=Array.isArray(evs)?evs:[]
  S.lesiones=Array.isArray(less)?less:[]
  S.notas=Array.isArray(nts)?nts:[]
  S.minutaje=Array.isArray(mins)?mins:[]
  if(S.jugadores.length){
    S.ev.jugador_id=S.jugadores[0].id
    S.ev.jugador_sale_id=S.jugadores[0].id
    S.addLes.jugador_id=S.jugadores[0].id
  }
  applyBg();render()
}

function getStats(jugId){
  const evs=S.eventos.filter(e=>e.jugador_id===jugId)
  const mins=S.partidos.reduce((a,p)=>a+(S.eventos.some(e=>e.partido_id===p.id&&e.jugador_id===jugId)?90:0),0)
  return{goles:evs.filter(e=>e.tipo==='Gol').length,asist:evs.filter(e=>e.tipo==='Asistencia').length,minutos:mins}
}

function calcHdr(){
  const p=S.partidos
  const pg=p.filter(x=>x.goles_favor>x.goles_contra).length
  const pe=p.filter(x=>x.goles_favor===x.goles_contra).length
  const pp=p.filter(x=>x.goles_favor<x.goles_contra).length
  return{pg,pe,pp,pts:pg*3+pe,gf:p.reduce((a,x)=>a+x.goles_favor,0),gc:p.reduce((a,x)=>a+x.goles_contra,0)}
}

function applyBg(){
  const b=S.bgImage
  if(b){document.body.style.backgroundImage=`url('${b}')`;document.body.classList.add('has-bg')}
  else{document.body.style.backgroundImage='';document.body.classList.remove('has-bg')}
}

async function handleFotoUpload(jugId,input){
  const file=input.files[0];if(!file)return
  toast('Subiendo foto...')
  const ext=file.name.split('.').pop()
  const filename=`jugador_${jugId}_${Date.now()}.${ext}`
  try{
    const r=await fetch(`${SB_URL}/storage/v1/object/jugadores/${filename}`,{
      method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+AUTH_TOKEN,'Content-Type':file.type,'x-upsert':'true'},
      body:file
    })
    if(r.ok){
      const url=`${SB_URL}/storage/v1/object/public/jugadores/${filename}`
      await patch('jugadores',{foto_url:url},`?id=eq.${jugId}`)
      toast('Foto actualizada ✓');cerrarModal();await cargarDatos()
    }else toast('Error — verifica el bucket "jugadores" en Supabase',true)
  }catch(e){toast('Error de conexión',true)}
}

function renderPitch(){

  slots.forEach(s=>{
    if(s.linea!==lastL&&cur.length>0){lineas.push(cur);cur=[]}
    cur.push(s);lastL=s.linea

function selSlot(idx){
  const jugId=S.titulares[idx]
  if(jugId&&S.partidoActivo){
    abrirEventoSlot(idx,jugId)
  }else{
    abrirAsignarSlot(idx)
  }
}

function asignarSlot(){
  const sel=document.getElementById('sel-slot-jug');if(!sel)return
  S.titulares[S.slotSeleccionado]=+sel.value||null
  S.slotSeleccionado=null;render()
}

function asignarSlotDirecto(idx,jugId){
  if(idx>=0)S.titulares[idx]=jugId||null
  S.slotSeleccionado=null
  document.getElementById('modal-root').innerHTML=''
  render()
}

function abrirEventoSlot(idx,jugId){
  S.slotEvPanel={jugId,slotIdx:idx,tipo:'Amarilla',minuto:1,subtipo:TIPOS_GOL[0],asistidor_id:'',asist_subtipo:'Pase',jugador_sale_id:''}
  renderEventoSlotModal()
}

    {t:'Gol',ico:'⚽',c:'var(--vc)'},
    {t:'Amarilla',ico:'🟡',c:'var(--am)'},
    {t:'Roja',ico:'🔴',c:'var(--ro)'},
    {t:'Asistencia',ico:'🅰️',c:'var(--az)'},
    {t:'Sustitución',ico:'🔄',c:'var(--gris)'},

  const tiposBtns=tipos.map(t=>{
    const isOn=p.tipo===t.t

      style="padding:10px 4px;border-radius:8px;border:2px solid ${isOn?t.c:'var(--borde2)'};background:${isOn?t.c+'33':'rgba(0,0,0,.3)'};color:${isOn?t.c:'var(--gris)'};font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s;width:100%">

    <div class="fg"><label>Asistidor (opcional)</label><select onchange="S.slotEvPanel.asistidor_id=this.value;renderEventoSlotModal()" style="${inputStyle}">
      <option value="">— Sin asistencia —</option>${opts}</select></div>
    ${p.asistidor_id?`<div class="fg"><label>Tipo de asistencia</label><select onchange="S.slotEvPanel.asist_subtipo=this.value" style="${inputStyle}">
      ${TIPOS_ASIST.map(t=>`<option ${p.asist_subtipo===t?'selected':''}>${t}</option>`).join('')}</select></div>`:''}`
  }else if(p.tipo==='Asistencia'){
    extra=`<div class="fg"><label>Tipo de asistencia</label><select onchange="S.slotEvPanel.subtipo=this.value" style="${inputStyle}">
      ${TIPOS_ASIST.map(st=>`<option ${p.subtipo===st?'selected':''}>${st}</option>`).join('')}</select></div>`

    extra=`<div class="fg"><label>Entra en su lugar</label><select onchange="S.slotEvPanel.jugador_sale_id=this.value" style="${inputStyle}">

  document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this){S.slotEvPanel=null;document.getElementById('modal-root').innerHTML=''}">
    <div class="modal" style="width:400px">

          </div>

            <div style="font-size:17px;font-weight:800">${j.numero} ${ap}</div>
            <div style="font-size:10px;color:var(--gris)">${j.posicion_especifica||j.posicion}</div>
          </div>

          style="width:90px;background:rgba(0,0,0,.5);border:1px solid var(--borde2);border-radius:6px;padding:7px 10px;color:white;font-size:16px;font-weight:800;font-family:var(--font)">
      </div>
      ${extra}
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn" style="flex:1;padding:10px" onclick="guardarEventoSlot()">✓ Guardar evento</button>
        <button class="bsm" onclick="S.slotEvPanel=null;document.getElementById('modal-root').innerHTML=''">Cancelar</button>
      </div>
    </div>
  </div>`
}

async function guardarEventoSlot(){
  const p=S.slotEvPanel
  if(!p||!S.partidoActivo)return
  // Para sustituciones desde un slot del 11 inicial: el jugador clickeado SALE,
  // el seleccionado en "Entra en su lugar" es quien ENTRA (jugador_id del evento).
  const isSubStarter=p.tipo==='Sustitución'&&p.slotIdx>=0
  const jugId=isSubStarter?(+p.jugador_sale_id||null):p.jugId
  const jugSale=isSubStarter?p.jugId:(p.tipo==='Sustitución'?(+p.jugador_sale_id||null):null)
  const r=await post('eventos',{
    partido_id:S.partidoActivo,jugador_id:jugId,tipo:p.tipo,minuto:+p.minuto,
    subtipo:['Gol','Asistencia'].includes(p.tipo)?p.subtipo:null,
    jugador_sale_id:jugSale,
  })
  if(Array.isArray(r)&&r[0]){
    let msg='Evento registrado ✓'
    if(p.tipo==='Gol'&&p.asistidor_id){
      await post('eventos',{partido_id:S.partidoActivo,jugador_id:+p.asistidor_id,tipo:'Asistencia',
        subtipo:p.asist_subtipo||'Pase',minuto:+p.minuto,jugador_sale_id:null})
      msg='Gol + Asistencia guardados ✓'
    }
    toast(msg)
    S.slotEvPanel=null
    document.getElementById('modal-root').innerHTML=''
    await cargarDatos();await selPartido(S.partidoActivo)
  }else toast('Error al guardar',true)
}

async function guardarFormacionPartido(){
  if(!S.partidoActivo)return
  await patch('partidos',{formacion:S.formacion,titulares:JSON.stringify(S.titulares)},`?id=eq.${S.partidoActivo}`)
  // Auto-calc and save minutaje silently
  const titIds=S.titulares.filter(x=>x)
  if(titIds.length>0){
    const mins=calcMinutajeAuto(titIds,S.evPartido,S.duracion)
    await Promise.all(Object.entries(mins).filter(([,v])=>v>0).map(([jid,minutos])=>
      fetch(`${SB_URL}/rest/v1/minutaje`,{
        method:'POST',
        headers:{...hdrs(),'Prefer':'resolution=merge-duplicates,return=representation'},
        body:JSON.stringify({partido_id:S.partidoActivo,jugador_id:+jid,minutos})
      })
    ))
  }
  toast('Formación y minutaje guardados ✓');await cargarDatos()
}

          ${pid?`<span style="font-size:10px;font-weight:700;color:var(--vc)">vs ${S.partidos.find(p=>p.id===pid)?.rival||''}</span>`:''}
          <button class="bsm" onclick="S.npShow=!S.npShow;render()">+ Nuevo</button>
        </div>
      </div>
      <div style="padding:10px 14px">
        ${npForm}
        ${S.partidos.length?(()=>{
          const ordenados=[...S.partidos].reverse()
          const idx=pid?ordenados.findIndex(p=>p.id===pid):0
          const cur=ordenados[idx]
          const prev=ordenados[idx+1]
          const next=ordenados[idx-1]
          const card=(p,small=false)=>{
            if(!p)return`<div style="width:${small?'80px':'180px'};flex-shrink:0"></div>`
            const res=p.goles_favor>p.goles_contra?'W':p.goles_favor===p.goles_contra?'D':'L'
            const bc=res==='W'?'var(--vc)':res==='D'?'var(--am)':'var(--ro)'
            const active=p.id===pid
            return`<div onclick="selPartido(${p.id})" style="flex-shrink:0;width:${small?'80px':'180px'};background:${active?'rgba(46,168,79,0.1)':'rgba(255,255,255,0.03)'};border:1px solid ${active?'var(--vc)':'var(--borde)'};border-left:3px solid ${bc};border-radius:8px;padding:${small?'6px 8px':'9px 12px'};cursor:pointer;opacity:${small?'0.55':'1'};transition:all .15s;position:relative">
              <div style="font-size:9px;color:var(--gris);margin-bottom:2px">${p.fecha} · ${p.condicion[0]}</div>
              <div style="font-size:${small?'10px':'12px'};font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">vs ${p.rival}</div>
              ${!small?`<div style="display:flex;align-items:center;gap:4px;margin-top:3px">
                <span style="font-size:14px;font-weight:800;color:${bc}">${p.goles_favor}–${p.goles_contra}</span>
                ${p.formacion?`<span class="badge bg" style="font-size:7px">${p.formacion}</span>`:''}
              </div>`:`<div style="font-size:11px;font-weight:800;color:${bc};margin-top:2px">${p.goles_favor}–${p.goles_contra}</div>`}
              ${!small?`<button onclick="event.stopPropagation();abrirEditarPartido(${p.id})" style="position:absolute;top:6px;right:6px;background:transparent;border:none;color:var(--gris);font-size:11px;cursor:pointer;padding:2px">✏️</button>`:''}
            </div>`
          }
          return`<div style="display:flex;align-items:center;gap:8px;justify-content:center">
            <button onclick="${prev?`selPartido(${prev.id})`:'void(0)'}" style="background:transparent;border:1px solid var(--borde);border-radius:50%;width:32px;height:32px;color:${prev?'var(--blanco)':'var(--muted)'};font-size:16px;cursor:${prev?'pointer':'default'};flex-shrink:0;display:flex;align-items:center;justify-content:center">‹</button>
            ${card(prev,true)}
            ${card(cur,false)}
            ${card(next,true)}
            <button onclick="${next?`selPartido(${next.id})`:'void(0)'}" style="background:transparent;border:1px solid var(--borde);border-radius:50%;width:32px;height:32px;color:${next?'var(--blanco)':'var(--muted)'};font-size:16px;cursor:${next?'pointer':'default'};flex-shrink:0;display:flex;align-items:center;justify-content:center">›</button>
          </div>`
        })():'<div class="empty" style="padding:12px">Sin partidos. Crea uno con + Nuevo.</div>'}
      </div>
    </div>
    ${pid?`
      <div style="max-width:760px;margin:0 auto">
        ${renderPitch()}
        <div style="text-align:center;font-size:10px;color:var(--muted);margin-top:4px;margin-bottom:12px">Haz clic en un jugador del 11 para registrar un evento</div>
      </div>
      <div class="panel" style="margin-top:4px">
        <div class="ph"><span class="pt">Eventos del partido</span><span style="font-size:10px;color:var(--gris)">${S.evPartido.length} registrado(s)</span></div>
        <div class="pb">${editEvForm}${evLista}</div>
      </div>
    `:`<div class="empty" style="padding:50px">← Selecciona un partido para comenzar</div>`}
  </div>`
}

async function selPartido(id){
  S.partidoActivo=id;S.slotSeleccionado=null
  const[evs,part]=await Promise.all([
    get('eventos',`?partido_id=eq.${id}&order=minuto`),
    get('partidos',`?id=eq.${id}`)
  ])
  S.evPartido=Array.isArray(evs)?evs:[]
  if(Array.isArray(part)&&part[0]){
    const p=part[0]
    if(p.formacion)S.formacion=p.formacion
    if(p.titulares){try{S.titulares=JSON.parse(p.titulares)||[]}catch(e){S.titulares=[]}}
  }
  render()
}

async function guardarPartido(){
  if(!S.np.rival.trim()){toast('Ingresa el rival',true);return}
  const r=await post('partidos',S.np)
  if(Array.isArray(r)&&r[0]){
    toast('Partido guardado')
    S.np={rival:'',competencia:'Primera B',condicion:'Local',fecha:hoy(),goles_favor:0,goles_contra:0}
    S.npShow=false;await cargarDatos();await selPartido(r[0].id)
  }else toast('Error al guardar',true)
}

async function agregarEvento(){
  if(!S.partidoActivo){toast('Selecciona un partido',true);return}
  const ev=S.ev
  const r=await post('eventos',{
    partido_id:S.partidoActivo,jugador_id:+ev.jugador_id,tipo:ev.tipo,
    subtipo:['Gol','Asistencia'].includes(ev.tipo)?ev.subtipo:null,
    minuto:+ev.minuto,jugador_sale_id:ev.tipo==='Sustitución'?+ev.jugador_sale_id:null,
  })
  if(Array.isArray(r)&&r[0]){
    let msg='Evento registrado'
    // Si es gol con asistidor, registrar asistencia automáticamente
    if(ev.tipo==='Gol'&&ev.asistidor_id){
      await post('eventos',{
        partido_id:S.partidoActivo,jugador_id:+ev.asistidor_id,tipo:'Asistencia',
        subtipo:ev.asist_subtipo||'Pase',minuto:+ev.minuto,jugador_sale_id:null,
      })
      msg='Gol + Asistencia guardados ✓'
    }
    toast(msg)
    await cargarDatos()
    await selPartido(S.partidoActivo)
    // Auto-recalcular minutaje si hay titulares y es sustitución
    if(ev.tipo==='Sustitución'){
      const titIds=S.titulares.filter(x=>x)
      if(titIds.length>0){
        const mins=calcMinutajeAuto(titIds,S.evPartido,S.duracion)
        await Promise.all(Object.entries(mins).filter(([,v])=>v>0).map(([jid,minutos])=>
          fetch(`${SB_URL}/rest/v1/minutaje`,{
            method:'POST',
            headers:{...hdrs(),'Prefer':'resolution=merge-duplicates,return=representation'},
            body:JSON.stringify({partido_id:S.partidoActivo,jugador_id:+jid,minutos})
          })
        ))
        toast('Minutaje actualizado automáticamente ✓')
      }
    }
  }else toast('Error',true)
}

async function guardarEdicionEvento(){
  if(!S.editEv)return
  const e=S.editEv
  await patch('eventos',{
    minuto:+e.minuto,tipo:e.tipo,
    subtipo:['Gol','Asistencia'].includes(e.tipo)?e.subtipo:null,
    jugador_id:+e.jugador_id,
    jugador_sale_id:e.tipo==='Sustitución'?(+e.jugador_sale_id||null):null,
  },`?id=eq.${e.id}`)
  toast('Evento actualizado ✓')
  S.editEv=null
  await cargarDatos()
  await selPartido(S.partidoActivo)
}

// NOTE: Add to Supabase jugadores table: valor (numeric), nacionalidad (text), notas (text)
function renderPlantilla(){
  let lista=S.filtPos==='todos'?[...S.jugadores]:S.jugadores.filter(j=>j.posicion===S.filtPos)
  if(S.filtEstadoPlantilla!=='todos'){
    const wantLes=S.filtEstadoPlantilla==='lesionado'
    lista=lista.filter(j=>wantLes?S.lesiones.some(l=>l.jugador_id===j.id):!S.lesiones.some(l=>l.jugador_id===j.id))
  }
  const dir=S.ordenDir||'asc'
  const dm=dir==='asc'?1:-1
  if(S.ordenPlantilla==='apellido'){
    lista.sort((a,b)=>{const aa=a.nombre.split(' ').slice(1).join(' ')||a.nombre;const bb=b.nombre.split(' ').slice(1).join(' ')||b.nombre;return aa.localeCompare(bb)*dm})
  }else if(S.ordenPlantilla==='posicion'){
    lista.sort((a,b)=>(a.posicion_especifica||a.posicion).localeCompare(b.posicion_especifica||b.posicion)*dm)
  }else if(S.ordenPlantilla==='zona'){
    const zOrd={POR:0,DEF:1,MED:2,DEL:3}
    lista.sort((a,b)=>((zOrd[a.posicion]||0)-(zOrd[b.posicion]||0))*dm)
  }else if(S.ordenPlantilla==='edad'){
    lista.sort((a,b)=>((a.edad||0)-(b.edad||0))*dm)
  }else if(S.ordenPlantilla==='altura'){
    lista.sort((a,b)=>((a.altura||0)-(b.altura||0))*dm)
  }else if(S.ordenPlantilla==='valor'){
    lista.sort((a,b)=>((a.valor||0)-(b.valor||0))*dm)
  }else if(S.ordenPlantilla==='contrato'){
    lista.sort((a,b)=>(a.contrato_hasta||'9999').localeCompare(b.contrato_hasta||'9999')*dm)
  }else if(S.ordenPlantilla==='pie'){
    lista.sort((a,b)=>(a.pie||'').localeCompare(b.pie||'')*dm)
  }else if(S.ordenPlantilla==='nac'){
    lista.sort((a,b)=>(a.nacionalidad||'').localeCompare(b.nacionalidad||'')*dm)
  }else{
    lista.sort((a,b)=>(a.numero-b.numero)*dm)
  }

  // Stats generales de toda la plantilla
  const tp=S.jugadores
  const conEdad=tp.filter(j=>j.edad)
  const conAlt=tp.filter(j=>j.altura)
  const edadProm=conEdad.length?(tp.reduce((a,j)=>a+(j.edad||0),0)/conEdad.length).toFixed(1):'-'
  const altProm=conAlt.length?Math.round(tp.reduce((a,j)=>a+(j.altura||0),0)/conAlt.length):'-'
  const valorTotal=tp.reduce((a,j)=>a+(j.valor||0),0)
  const nPOR=tp.filter(j=>j.posicion==='POR').length
  const nDEF=tp.filter(j=>j.posicion==='DEF').length
  const nMED=tp.filter(j=>j.posicion==='MED').length
  const nDEL=tp.filter(j=>j.posicion==='DEL').length
  const nDiestros=tp.filter(j=>j.pie==='Derecho').length
  const nZurdos=tp.filter(j=>j.pie==='Izquierdo').length
  const nAmbi=tp.filter(j=>j.pie==='Ambidiestro').length

  const posEspOpts=Object.entries(POS_GRUPOS).map(([g,lst])=>
    `<optgroup label="${g==='POR'?'Portería':g==='DEF'?'Defensa':g==='MED'?'Mediocampo':'Delantera'}">`+

  const addForm=S.addJugShow?`<div class="panel" style="margin-bottom:12px">
    <div class="ph"><span class="pt">Nuevo jugador</span></div>

      <div class="fr2">

        <th>Club Origen</th><th>Contrato</th><th class="center">Valor</th>
        <th>Notas</th><th class="center">Estado</th><th></th>
      </tr></thead>
      <tbody>${filas}</tbody>
    </table></div>`:'<div class="empty">Sin jugadores</div>'}

}

async function guardarJugador(){
  const j=S.addJug
  if(!j.nombre.trim()||!j.numero){toast('Completa nombre y número',true);return}
  const r=await post('jugadores',{
    nombre:j.nombre.trim(),numero:+j.numero,edad:+j.edad,posicion:j.posicion,
    posicion_especifica:j.posicion_especifica||null,
    pie:j.pie,altura:+j.altura||null,
    club_origen:j.club_origen||null,
    contrato_hasta:j.contrato_hasta||null,
    valor:+j.valor||null,
    nacionalidad:j.nacionalidad||'Chilena',
    notas:j.notas||null,
  })
  if(Array.isArray(r)&&r[0]){
    toast('Jugador agregado')
    S.addJugShow=false
    S.addJug={numero:'',nombre:'',posicion:'MED',posicion_especifica:'',edad:22,pie:'Derecho',altura:'',club_origen:'',contrato_hasta:'',valor:'',nacionalidad:'Chilena',notas:''}
    await cargarDatos()
  }else toast('Error',true)
}

// ===== PARTIDOS =====
function renderPartidos(){
  const fc=S.filtComp
  const lista=fc==='todos'?S.partidos:S.partidos.filter(p=>p.competencia===fc)
  const pg=lista.filter(p=>p.goles_favor>p.goles_contra).length
  const pe=lista.filter(p=>p.goles_favor===p.goles_contra).length
  const pp=lista.filter(p=>p.goles_favor<p.goles_contra).length
  const gf=lista.reduce((a,p)=>a+p.goles_favor,0)
  const gc=lista.reduce((a,p)=>a+p.goles_contra,0)
  const pz=lista.filter(p=>p.goles_contra===0).length
  const racha=[...lista].slice(-5).map(p=>p.goles_favor>p.goles_contra?'W':p.goles_favor===p.goles_contra?'D':'L')

  const cards=[...lista].reverse().map(p=>{
    const res=p.goles_favor>p.goles_contra?'W':p.goles_favor===p.goles_contra?'D':'L'
    const rb=res==='W'?'bv':res==='D'?'ba':'br'
    const rl=res==='W'?'Victoria':res==='D'?'Empate':'Derrota'
    const goles=S.eventos.filter(e=>e.partido_id===p.id&&e.tipo==='Gol').map(e=>`<span class="badge bv">⚽ ${jugApellido(e.jugador_id)} ${e.minuto}'</span>`).join(' ')
    const borderColor=res==='W'?'var(--vc)':res==='D'?'var(--am)':'var(--ro)'
    return`<div class="pcard" style="cursor:default;border-left:3px solid ${borderColor}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px">
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          <span class="badge ${rb}">${rl}</span>
          <span class="badge ${p.condicion==='Local'?'baz':'bg'}">${p.condicion}</span>
          <span class="badge bg">${p.competencia}</span>
          ${p.formacion?`<span class="badge bg">${p.formacion}</span>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:10px;color:var(--gris)">${p.fecha}</span>
          <button class="bsm" style="padding:2px 8px;font-size:10px" onclick="abrirEditarPartido(${p.id})">✏️ Editar</button>
        </div>
      </div>
      <div class="rbox">
        <div class="req" style="text-align:right">Deportes Temuco</div>
        <div class="rscore">${p.goles_favor}</div><div class="rsep">—</div><div class="rscore" style="color:var(--gris)">${p.goles_contra}</div>
        <div class="req">${p.rival}</div>
      </div>
      ${goles?`<div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap">${goles}</div>`:''}
    </div>`
  }).join('')

  return`<div class="content">
    <div class="tabs">${['todos','Primera B','Copa Chile'].map(c=>`<button class="tab ${fc===c?'on':''}" onclick="S.filtComp='${c}';render()">${c==='todos'?'Todos':c}</button>`).join('')}</div>
    <div class="g4">
      <div class="mc verde"><div class="mc-l">Puntos</div><div class="mc-v">${pg*3+pe}</div></div>
      <div class="mc"><div class="mc-l">P / E / D</div><div class="mc-v">${pg}-${pe}-${pp}</div></div>
      <div class="mc"><div class="mc-l">Goles F/C</div><div class="mc-v">${gf}/${gc}</div></div>
      <div class="mc verde"><div class="mc-l">Porterías 0</div><div class="mc-v">${pz}</div></div>
    </div>
    <div class="panel" style="margin-bottom:12px">
      <div class="ph"><span class="pt">Últimos 5 partidos</span></div>
      <div class="pb" style="display:flex;gap:4px;align-items:center">
        ${racha.length?racha.map(r=>`<span class="form-dot ${r}">${r}</span>`).join(''):'<span style="color:var(--gris);font-size:11px">Sin partidos</span>'}
      </div>
    </div>
    ${lista.length?cards:'<div class="empty">Sin partidos registrados</div>'}
  </div>`
}

// ===== ESTADÍSTICAS =====
function renderEstadisticas(){
  const fc=S.filtCompEst
  const partsFilt=fc==='todos'?S.partidos:S.partidos.filter(p=>p.competencia===fc)
  const pidsFilt=new Set(partsFilt.map(p=>p.id))
  const evsFilt=S.eventos.filter(e=>pidsFilt.has(e.partido_id))

  const statsJug=S.jugadores.map(j=>{
    const evJ=evsFilt.filter(e=>e.jugador_id===j.id)
    const goles=evJ.filter(e=>e.tipo==='Gol').length
    const asist=evJ.filter(e=>e.tipo==='Asistencia').length
    const amarillas=evJ.filter(e=>e.tipo==='Amarilla').length
    const rojas=evJ.filter(e=>e.tipo==='Roja').length
    const min=S.minutaje.filter(m=>pidsFilt.has(m.partido_id)&&m.jugador_id===j.id).reduce((a,m)=>a+m.minutos,0)
    return{...j,goles,asist,amarillas,rojas,min,g90:min>0?goles/min*90:0,a90:min>0?asist/min*90:0}
  })

  const goleadores=[...statsJug].filter(j=>j.goles>0).sort((a,b)=>b.goles-a.goles)
  const asistidores=[...statsJug].filter(j=>j.asist>0).sort((a,b)=>b.asist-a.asist)
  const topG90=[...statsJug].filter(j=>j.min>=90&&j.goles>0).sort((a,b)=>b.g90-a.g90)
  const disciplina=[...statsJug].filter(j=>j.amarillas>0||j.rojas>0).sort((a,b)=>(b.amarillas+b.rojas*3)-(a.amarillas+a.rojas*3))

  // Sinergia: pares (asistidor → goleador) con más jugadas en conjunto
  const sinergia={}
  evsFilt.filter(e=>e.tipo==='Gol').forEach(gol=>{
    const asist=evsFilt.find(e=>e.tipo==='Asistencia'&&e.partido_id===gol.partido_id&&e.minuto===gol.minuto)
    if(!asist||asist.jugador_id===gol.jugador_id)return
    const key=`${asist.jugador_id}_${gol.jugador_id}`
    sinergia[key]=(sinergia[key]||0)+1
  })
  const topSinergia=Object.entries(sinergia)
    .map(([k,n])=>{const[aid,gid]=k.split('_').map(Number);return{aid,gid,n}})
    .sort((a,b)=>b.n-a.n)

  const cGol={};TIPOS_GOL.forEach(t=>cGol[t]=0)
  evsFilt.filter(e=>e.tipo==='Gol').forEach(e=>{if(e.subtipo)cGol[e.subtipo]=(cGol[e.subtipo]||0)+1})
  const totG=Math.max(1,Object.values(cGol).reduce((a,b)=>a+b,0))
  const gf=partsFilt.reduce((a,p)=>a+p.goles_favor,0)
  const ta=evsFilt.filter(e=>e.tipo==='Amarilla').length
  const tr=evsFilt.filter(e=>e.tipo==='Roja').length
  const pz=partsFilt.filter(p=>p.goles_contra===0).length
  const locales=partsFilt.filter(p=>p.condicion==='Local')
  const visitas=partsFilt.filter(p=>p.condicion==='Visita')
  const locPts=locales.filter(p=>p.goles_favor>p.goles_contra).length*3+locales.filter(p=>p.goles_favor===p.goles_contra).length
  const visPts=visitas.filter(p=>p.goles_favor>p.goles_contra).length*3+visitas.filter(p=>p.goles_favor===p.goles_contra).length
  const golesT1=evsFilt.filter(e=>e.tipo==='Gol'&&e.minuto<=30).length
  const golesT2=evsFilt.filter(e=>e.tipo==='Gol'&&e.minuto>30&&e.minuto<=60).length
  const golesT3=evsFilt.filter(e=>e.tipo==='Gol'&&e.minuto>60).length

  // Goles/asistencias en últimos 10 min (threshold 80)
  const threshold=80
  const golesUlt=evsFilt.filter(e=>e.tipo==='Gol'&&e.minuto>=threshold)
  const asistUlt=evsFilt.filter(e=>e.tipo==='Asistencia'&&e.minuto>=threshold)

  return`<div class="content">
    <div class="tabs">${['todos','Primera B','Copa Chile'].map(c=>`<button class="tab ${S.filtCompEst===c?'on':''}" onclick="S.filtCompEst='${c}';render()">${c==='todos'?'Todas':c}</button>`).join('')}</div>
    <div class="g4">
      <div class="mc verde"><div class="mc-l">Goles/partido</div><div class="mc-v">${partsFilt.length>0?(gf/partsFilt.length).toFixed(2):'0.00'}</div></div>
      <div class="mc"><div class="mc-l">Porterías en 0</div><div class="mc-v">${pz}</div></div>
      <div class="mc am"><div class="mc-l">Amarillas</div><div class="mc-v">${ta}</div></div>
      <div class="mc ro"><div class="mc-l">Rojas</div><div class="mc-v">${tr}</div></div>
    </div>
    <div class="g2">
      <div class="mc az"><div class="mc-l">Pts Local (${locales.length} partidos)</div><div class="mc-v">${locPts}</div><div class="mc-s">${locales.filter(p=>p.goles_favor>p.goles_contra).length}G ${locales.filter(p=>p.goles_favor===p.goles_contra).length}E ${locales.filter(p=>p.goles_favor<p.goles_contra).length}D</div></div>
      <div class="mc"><div class="mc-l">Pts Visita (${visitas.length} partidos)</div><div class="mc-v">${visPts}</div><div class="mc-s">${visitas.filter(p=>p.goles_favor>p.goles_contra).length}G ${visitas.filter(p=>p.goles_favor===p.goles_contra).length}E ${visitas.filter(p=>p.goles_favor<p.goles_contra).length}D</div></div>
    </div>
    <div class="panel" style="margin-bottom:12px">
      <div class="ph"><span class="pt">Goles por período</span></div>
      <div class="pb" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        ${[['0-30 min',golesT1,'var(--vc)'],['31-60 min',golesT2,'var(--am)'],['61-90 min',golesT3,'var(--ro)']].map(([label,n,color])=>{
          const pct=Math.round(n/Math.max(1,golesT1+golesT2+golesT3)*100)
          return`<div style="text-align:center;padding:8px;background:rgba(0,0,0,.2);border-radius:6px">
            <div style="font-size:22px;font-weight:800;color:${color}">${n}</div>
            <div style="font-size:9px;color:var(--gris)">${label}</div>
            <div class="bar-w" style="margin-top:6px"><div class="bar-f" style="width:${pct}%;background:${color}"></div></div>
            <div style="font-size:9px;color:var(--muted);margin-top:2px">${pct}%</div>
          </div>`
        }).join('')}
      </div>
    </div>
    <div class="g2">
      <div class="panel"><div class="ph"><span class="pt">Goleadores</span></div>

        ${goleadores.slice(0,8).map((j,i)=>`<tr><td>${i===0?'🥇':i===1?'🥈':i===2?'🥉':'  '} ${jugApellido(j.id)}</td><td><span class="pos-${j.posicion}" style="font-size:8px">${j.posicion_especifica?.split(' ')[0]||j.posicion}</span></td><td class="num">${j.goles}</td><td class="num" style="color:var(--vc);font-weight:800">${j.g90.toFixed(2)}</td></tr>`).join('')||`<tr><td colspan="4" style="text-align:center;color:var(--gris);padding:12px">Sin goles</td></tr>`}
        </tbody></table>
      </div>
      <div class="panel"><div class="ph"><span class="pt">Asistidores</span></div>
        <table><thead><tr><th>Jugador</th><th>Pos</th><th class="num">A</th><th class="num">A/90</th></tr></thead><tbody>
        ${asistidores.slice(0,8).map((j,i)=>`<tr><td>${i===0?'🥇':i===1?'🥈':i===2?'🥉':'  '} ${jugApellido(j.id)}</td><td><span class="pos-${j.posicion}" style="font-size:8px">${j.posicion_especifica?.split(' ')[0]||j.posicion}</span></td><td class="num">${j.asist}</td><td class="num" style="color:var(--az);font-weight:800">${j.a90.toFixed(2)}</td></tr>`).join('')||`<tr><td colspan="4" style="text-align:center;color:var(--gris);padding:12px">Sin asistencias</td></tr>`}

      <div class="pb">
        ${topSinergia.length?topSinergia.slice(0,8).map((p,i)=>{
          const maxN=topSinergia[0].n
          const pct=Math.round(p.n/maxN*100)
          const aAp=jugApellido(p.aid)

                  ${aJ?.foto_url?`<img src="${aJ.foto_url}" style="width:100%;height:100%;object-fit:cover">`:(aJ?.nombre||'?').split(' ').map(w=>w[0]).join('').slice(0,2)}

                  ${gJ?.foto_url?`<img src="${gJ.foto_url}" style="width:100%;height:100%;object-fit:cover">`:(gJ?.nombre||'?').split(' ').map(w=>w[0]).join('').slice(0,2)}
                </div>
                <div style="min-width:0">
                  <div style="font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px">${gAp}</div>

      if(!fst.length)return''
      return`<div class="panel">
        <div class="ph"><span class="pt">Rendimiento por formación</span></div>
        <table><thead><tr><th>Formación</th><th class="center">PJ</th><th class="center">G</th><th class="center">E</th><th class="center">D</th><th class="num">%V</th></tr></thead><tbody>
        ${fst.map(f=>{const pv=Math.round(f.g/f.pj*100);return`<tr>
          <td><span class="badge bg">${f.f}</span></td>
          <td class="center">${f.pj}</td>
          <td class="center" style="color:var(--vc);font-weight:700">${f.g}</td>
          <td class="center" style="color:var(--am)">${f.e}</td>

function agregarTipoGol(){
  const val=S.nuevoTipoGol.trim()
  if(!val){toast('Escribe un nombre',true);return}
  if(TIPOS_GOL.includes(val)){toast('Ese tipo ya existe',true);return}
  TIPOS_GOL.push(val);S.nuevoTipoGol='';render();toast('Tipo "'+val+'" agregado')
}

function eliminarTipoGol(i){
  const tipo=TIPOS_GOL[i]
  if(S.eventos.some(e=>e.subtipo===tipo&&e.tipo==='Gol')){toast('No se puede eliminar — hay goles con este tipo',true);return}
  TIPOS_GOL.splice(i,1);render();toast('Tipo eliminado')
}

function renderMedico(){
  const les=S.lesiones
  const jugOptsLes=S.jugadores.map(j=>`<option value="${j.id}">#${j.numero} ${jugApellido(j.id)}</option>`).join('')
  const addForm=S.lesShow?`<div style="padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--borde)">
    <div class="fg"><label>Jugador</label><select onchange="S.addLes.jugador_id=+this.value">${jugOptsLes}</select></div>
    <div class="fg"><label>Tipo de lesión</label><select onchange="S.addLes.tipo=this.value">
      ${['Desgarro muscular','Esguince','Fractura','Contusión','Rotura de ligamentos','Sobrecarga','Otro'].map(t=>`<option>${t}</option>`).join('')}
    </select></div>
    <div class="fr2">
      <div class="fg" style="margin-bottom:0"><label>Fecha inicio</label><input type="date" value="${S.addLes.fecha_inicio}" oninput="S.addLes.fecha_inicio=this.value"></div>
      <div class="fg" style="margin-bottom:0"><label>Semanas</label><input type="number" min="1" max="52" value="${S.addLes.semanas_recuperacion}" oninput="S.addLes.semanas_recuperacion=+this.value"></div>
    </div>
    <div style="display:flex;gap:6px;margin-top:10px"><button class="btn" onclick="guardarLesion()">Guardar</button><button class="bsm" onclick="S.lesShow=false;render()">Cancelar</button></div>
  </div>`:''

  const lesCards=les.map(l=>{
    const j=S.jugadores.find(x=>x.id===l.jugador_id)
    const inicio=new Date(l.fecha_inicio)
    const alta=new Date(inicio);alta.setDate(alta.getDate()+l.semanas_recuperacion*7)
    const dias=Math.max(0,Math.ceil((alta-new Date())/86400000))
    const pct=Math.min(100,Math.round(dias/(l.semanas_recuperacion*7)*100))
    return`<div class="pcard" style="cursor:default;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div style="font-size:14px;font-weight:700">${j?.nombre||'?'}</div><div style="font-size:10px;color:var(--gris)">${l.tipo} · Alta estimada: ${alta.toLocaleDateString('es-CL')}</div></div>
        <div style="text-align:right"><div style="font-size:20px;font-weight:800;color:var(--ro)">${dias}</div><div style="font-size:9px;color:var(--gris)">días restantes</div></div>
      </div>
      <div class="bar-w" style="margin-top:6px"><div class="bar-f" style="width:${pct}%;background:var(--ro)"></div></div>
      <button class="bsm" style="margin-top:8px" onclick="darAlta(${l.id})">✅ Dar alta</button>
    </div>`
  }).join('')

  const dispTabla=S.jugadores.map(j=>{
    const lesion=les.find(l=>l.jugador_id===j.id)
    return`<tr>
      <td>#${j.numero} ${jugApellido(j.id)}</td>
      <td><span style="font-size:9px;color:var(--gris)">${j.posicion_especifica?.split(' ')[0]||j.posicion}</span></td>
      <td class="center"><span class="badge ${lesion?'br':'bv'}">${lesion?'Lesionado':'Disponible'}</span></td>
    </tr>`
  }).join('')

  return`<div class="content"><div class="g2">
    <div><div class="panel">
      <div class="ph"><span class="pt">Lesiones activas</span><button class="bsm" onclick="S.lesShow=!S.lesShow;render()">+ Registrar</button></div>
      <div class="pb">${addForm}${les.length?lesCards:'<div class="empty">💪 Sin lesiones activas</div>'}</div>
    </div></div>
    <div><div class="panel">
      <div class="ph"><span class="pt">Disponibilidad plantilla</span></div>
      <table><thead><tr><th>Jugador</th><th>Pos</th><th class="center">Estado</th></tr></thead><tbody>${dispTabla}</tbody></table>
    </div></div>
  </div></div>`
}

async function guardarLesion(){
  const l=S.addLes
  if(!l.jugador_id){toast('Selecciona jugador',true);return}
  const r=await post('lesiones',{...l,jugador_id:+l.jugador_id,semanas_recuperacion:+l.semanas_recuperacion})
  if(Array.isArray(r)&&r[0]){toast('Lesión registrada');S.lesShow=false;await cargarDatos()}
  else toast('Error',true)
}

async function darAlta(id){
  await patch('lesiones',{alta:true,fecha_alta:hoy()},`?id=eq.${id}`)
  toast('Jugador dado de alta ✅');await cargarDatos()
}

function guardarStaff(){

  S.staff.push({...a,id:Date.now()})
  localStorage.setItem('dt-staff',JSON.stringify(S.staff))

function borrarStaff(idx){
  S.staff.splice(idx,1)

}

        <div style="font-size:10px;color:var(--gris)">${S.notas.length} entrada${S.notas.length!==1?'s':''}</div>
      </div>
      <button class="btn" onclick="S.notaFormShow=true;render()">+ Nueva nota</button>
    </div>
    ${S.notas.length?`<div style="display:flex;flex-direction:column;gap:12px">
      ${S.notas.map(n=>{
        const pLabel=partidoLabel(n.partido_id)
        const preview=n.texto.length>160?n.texto.slice(0,160)+'…':n.texto
        return`<div onclick="S.notaVer=${n.id};render()" style="background:var(--panel);border:1px solid var(--borde);border-radius:10px;padding:18px 20px;cursor:pointer;transition:border-color .2s" onmouseover="this.style.borderColor='var(--borde2)'" onmouseout="this.style.borderColor='var(--borde)'">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px">
            <div style="font-size:11px;font-weight:700;color:var(--vc);text-transform:uppercase;letter-spacing:.6px">${fmtFecha(n.fecha)}</div>
            ${pLabel?`<div style="font-size:9px;color:var(--gris);background:rgba(255,255,255,0.05);border-radius:12px;padding:2px 8px;white-space:nowrap">⚽ ${pLabel}</div>`:''}
          </div>
          <div style="font-size:12px;color:rgba(238,244,238,0.8);line-height:1.6;font-family:Georgia,serif;margin-bottom:12px">${preview.replace(/</g,'&lt;')}</div>
          <div style="font-size:10px;color:var(--muted);text-align:right;font-style:italic">— ${n.firma}</div>
        </div>`
      }).join('')}
    </div>`:`<div style="text-align:center;padding:60px 20px;color:var(--gris)">
      <div style="font-size:32px;margin-bottom:12px">📝</div>
      <div style="font-size:13px;font-weight:600;margin-bottom:6px">Aún no hay notas</div>
      <div style="font-size:11px;color:var(--muted)">Escribe tu primer análisis post-partido</div>
    </div>`}
  </div>`
}

function render(){
  const root=document.getElementById('root')
  if(S.pag==='login'){root.innerHTML=renderLogin();return}
  root.innerHTML=`<div id="app">${renderHdr()}${renderNav()}${
    S.pag==='registro'?renderRegistro():
    S.pag==='plantilla'?renderPlantilla():
    S.pag==='partidos'?renderPartidos():
    S.pag==='estadisticas'?renderEstadisticas():
    S.pag==='notas'?renderNotas():
    S.pag==='debug'?renderDebug():
    S.pag==='config'?renderConfig():
    renderMedico()
  }</div>`
}

applyBg();render()
</script>
</body>
</html>
